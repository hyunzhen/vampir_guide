<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>뱀피르 입문노트</title><style>
:root{
  --bg:#f6f6f4;
  --panel:#ffffff;
  --panel2:#f0f0ee;
  --text:#151515;
  --muted:#666666;
  --line:#ddddda;
  --soft:#fafafa;
  --accent:#c5162e;
  --accent-dark:#970f22;
  --accent-soft:#fff0f2;
  --shadow:0 12px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif;
  font-size:17px;
  line-height:1.78;
  letter-spacing:0;
  -webkit-text-size-adjust:100%;
}
a{color:var(--accent-dark);text-decoration:none}
a:hover{text-decoration:underline}
.hero{
  min-height:32vh;
  display:grid;
  align-items:end;
  background:
    linear-gradient(180deg,rgba(255,255,255,.88),rgba(246,246,244,.98)),
    linear-gradient(135deg,#ffffff 0%,#f2f2f0 58%,#ffe8ec 100%);
  padding:38px 24px 30px;
  border-bottom:1px solid var(--line);
}
.hero-inner,.topbar-inner,.page,.footer{max-width:1040px;margin:0 auto}
.eyebrow{
  color:var(--accent);
  font-weight:800;
  font-size:13px;
  letter-spacing:.02em;
}
.hero h1{
  font-size:clamp(36px,5vw,64px);
  line-height:1.04;
  margin:8px 0 14px;
  color:#050505;
  font-weight:850;
}
.lead{
  font-size:clamp(16px,2vw,20px);
  max-width:780px;
  color:#3f3f3f;
  margin:0;
}
.topbar{
  position:sticky;
  top:0;
  z-index:30;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  padding:8px 18px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
}
.search{
  display:flex;
  gap:8px;
  align-items:center;
  min-height:38px;
  background:#fff;
  border:1px solid #cfcfca;
  border-radius:8px;
  padding:6px 11px;
}
.search span{width:18px;flex:0 0 18px;color:#222;font-size:16px;line-height:1;text-align:center}
.search input{
  width:100%;
  min-width:0;
  background:transparent;
  border:0;
  outline:0;
  color:var(--text);
  font-size:15px;
  line-height:1.2;
}
.search:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(197,22,46,.13);
}
.btn{
  min-height:38px;
  border:1px solid #cfcfca;
  background:#111;
  color:#fff;
  border-radius:8px;
  padding:6px 13px;
  cursor:pointer;
  font-weight:700;
  line-height:1.2;
}
.btn:hover{background:var(--accent)}
.page{padding:16px 18px 64px}
.tabs-wrap{
  position:sticky;
  top:55px;
  z-index:20;
  background:rgba(246,246,244,.97);
  backdrop-filter:blur(8px);
  padding:10px 0 12px;
  margin:0 0 18px;
  border-bottom:1px solid var(--line);
}
.tabs{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:8px;
  width:100%;
}
.tabbtn{
  min-height:56px;
  width:100%;
  text-align:left;
  background:#fff;
  border:1px solid #d6d6d2;
  border-radius:8px;
  padding:10px 12px;
  color:var(--text);
  cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.04);
}
.tabbtn:hover{
  border-color:#111;
  background:#fbfbfa;
}
.tabbtn.active{
  border-color:var(--accent);
  background:var(--accent-soft);
  box-shadow:inset 0 0 0 1px var(--accent);
}
.tabbtn b{
  display:block;
  color:#111;
  font-size:13px;
  line-height:1.25;
}
.tabbtn.active b{color:var(--accent-dark)}
.tabbtn span{
  display:block;
  color:var(--muted);
  font-size:12px;
  line-height:1.25;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.results,.doc{
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel);
  box-shadow:var(--shadow);
}
.results{
  display:none;
  width:100%;
  margin:0 0 18px;
  padding:16px;
}
.results.active{display:block}
.result-item{
  border-top:1px solid var(--line);
  padding:11px 0;
}
.result-item:first-child{border-top:0}
.result-item button{
  background:none;
  border:0;
  color:var(--text);
  font:inherit;
  text-align:left;
  cursor:pointer;
  padding:0;
}
.source,.snippet,.footer{
  color:var(--muted);
  font-size:13px;
}
.doc{
  margin:0 0 24px;
  overflow:hidden;
  width:100%;
  max-width:none;
}
.doc-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  padding:18px 22px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,#111 0%,#222 72%,var(--accent-dark) 100%);
  color:#fff;
}
.doc-head h2{
  margin:0;
  font-size:23px;
  line-height:1.25;
}
.doc-head .source{color:#d8d8d8}
.tag{
  font-size:12px;
  border:1px solid rgba(255,255,255,.55);
  color:#fff;
  background:rgba(197,22,46,.9);
  border-radius:999px;
  padding:4px 9px;
  white-space:nowrap;
}
.content{
  padding:26px 28px;
  font-size:17px;
  line-height:1.82;
}
.content h1{
  font-size:32px;
  line-height:1.24;
  margin:4px 0 18px;
  color:#050505;
}
.content h2{
  font-size:25px;
  line-height:1.32;
  margin:38px 0 14px;
  border-top:2px solid #111;
  padding-top:24px;
  color:#111;
}
.content h3{
  font-size:20px;
  line-height:1.35;
  margin:26px 0 10px;
  color:var(--accent-dark);
}
.content h4{
  font-size:17px;
  margin:20px 0 8px;
  color:#222;
}
.content p{margin:11px 0}
.content blockquote{
  border-left:4px solid var(--accent);
  margin:14px 0;
  padding:10px 16px;
  background:var(--accent-soft);
  color:#2a2a2a;
}
.content code{
  background:#f1f1ef;
  border:1px solid #d8d8d4;
  padding:2px 6px;
  border-radius:5px;
  color:#111;
}
.content pre{
  background:#111;
  color:#fff;
  border:1px solid #111;
  border-radius:8px;
  padding:16px;
  overflow:auto;
}
.content pre code{
  background:transparent;
  border:0;
  color:#fff;
  padding:0;
}
.content table{
  width:100%;
  border-collapse:collapse;
  margin:14px 0 18px;
  display:block;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
.content th,.content td{
  border:1px solid #d9d9d5;
  padding:9px 11px;
  vertical-align:top;
  min-width:92px;
}
.content th{
  background:#111;
  color:#fff;
  font-weight:800;
}
.content tr:nth-child(even) td{background:#fafafa}
.content tr:hover td{background:#fff5f6}
.content hr{
  border:0;
  border-top:1px solid var(--line);
  margin:28px 0;
}
.content ul,.content ol{
  padding-left:25px;
  margin:10px 0 16px;
}
.content li{margin:4px 0}
mark{
  background:#ffd6dc;
  color:#111;
  border-radius:3px;
  padding:0 2px;
}
.footer{padding:0 18px 42px}
@media(max-width:1080px){
  .tabs{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:720px){
  body{font-size:16px;line-height:1.72}
  .hero{min-height:26vh;padding:28px 16px 24px}
  .hero h1{font-size:34px}
  .lead{font-size:15.5px}
  .topbar-inner{grid-template-columns:minmax(0,1fr) auto;padding:8px 12px;gap:8px}
  .btn{width:auto;white-space:nowrap}
  .page{padding:10px 12px 50px}
  .tabs-wrap{
    top:55px;
    margin-left:-12px;
    margin-right:-12px;
    padding:8px 12px;
    overflow:hidden;
  }
  .tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    overscroll-behavior-x:contain;
    -webkit-overflow-scrolling:touch;
    padding-bottom:3px;
  }
  .tabbtn{
    flex:0 0 132px;
    width:auto;
    min-height:50px;
    padding:9px 10px;
  }
  .doc{border-radius:8px}
  .doc-head{display:block;padding:15px 16px}
  .doc-head h2{font-size:20px}
  .tag{display:inline-block;margin-top:8px}
  .content{padding:17px 15px;font-size:16px;line-height:1.76}
  .content h1{font-size:25px}
  .content h2{font-size:21px;margin-top:32px;padding-top:20px}
  .content h3{font-size:18px}
  .content th,.content td{padding:8px 9px}
  .search span{display:block}
}
@media(max-width:420px){
  .hero h1{font-size:31px}
  .tabbtn{flex-basis:118px}
  .tabbtn span{display:none}
  .content{font-size:15.5px}

</style></head><body><header class="hero" id="top"><div class="hero-inner"><div class="eyebrow">넷마블 뱀피르 가이드</div><h1>뱀피르 입문노트</h1></div></header><div class="topbar"><div class="topbar-inner"><label class="search"><span aria-hidden="true">🔍</span><input id="searchInput" type="search" placeholder="명중, 세피라, 서포트 모드, 게헨나처럼 검색"></label><button class="btn" id="clearBtn">초기화</button></div></div><main class="page"><div class="tabs-wrap"><div id="tabs" class="tabs" aria-label="대분류 탭"></div></div><div id="results" class="results"></div><div id="docs"></div></main><footer class="footer">이 페이지는 같은 폴더의 원본 문서와 엑셀 파일을 포함해 생성한 로컬 HTML입니다. 최신 게임 내용은 공식 공지와 함께 확인하세요.</footer><script id="guide-data" type="application/json">[{"id":"quickstart","title":"빠른 시작 체크리스트","kind":"요약","source":"사이트 편집 요약","content":"# 뱀피르 빠른 시작 체크리스트\n\n> 원본 공략을 읽기 전, 처음 접속한 유저가 바로 따라갈 수 있도록 핵심 행동만 모은 요약 탭입니다. 세부 근거와 상세 설명은 각 원본 탭에 모두 보존되어 있습니다.\n\n---\n\n## 1. 첫 접속 10분 안에 할 일\n\n| 순서 | 할 일 | 이유 |\n|---|---|---|\n| 1 | 사냥 범위 10m 설정 | 몬스터를 멀리 쫓아다니는 비효율 방지 |\n| 2 | 자동 물약 사용 ON | 자동 사냥 중 사망 위험 감소 |\n| 3 | 매너 모드 OFF 확인 | 단독 사냥 효율 확보 |\n| 4 | 카메라 흔들림 OFF | 장시간 플레이 피로 감소 |\n| 5 | 쿠폰·우편함·탈것 보상 확인 | 초반 경험치와 재화 손실 방지 |\n| 6 | 클래스에 맞는 명중 타입 확인 | 잘못된 명중 투자 방지 |\n\n---\n\n## 2. 초반 성장 핵심 순서\n\n메인 퀘스트 진행 → 스킬북 구매 → 컬렉션 등록 → 안전 강화 → 던전 루틴 → 내실 투자\n\n- Lv.1~30: 메인 퀘스트를 최우선으로 밀기\n- Lv.30~46: 일반 던전, 컬렉션, 암거래, 아티팩트 루틴 시작\n- Lv.46~48: 서포트 모드와 나리찬예 계곡 준비\n- Lv.48~60: 세피라, 규율, 마력 연구 등 내실 확장\n- Lv.60 이상: 클랜, 게헨나, 절대 규율, 중후반 콘텐츠 진입\n\n---\n\n## 3. 전투력보다 먼저 볼 능력치\n\n전투력 수치가 높아도 공격이 빗나가면 사냥 효율이 떨어집니다.\n\n| 우선순위 | 능력치 | 설명 |\n|---|---|---|\n| 1 | 명중 | 현재 사냥터에서 빗나감이 없어질 때까지 확보 |\n| 2 | 공격력 | 명중 확보 후 실제 사냥 속도 향상 |\n| 3 | 방어·HP | 사냥 안정성이 부족할 때 보강 |\n\n클래스별 명중 타입:\n\n| 클래스 | 우선 명중 |\n|---|---|\n| 블러드스테인 | 근거리 명중 |\n| 그림리퍼 | 근거리 명중 |\n| 아카샤 | 근거리 명중 |\n| 카니지 | 원거리 명중 |\n| 바이퍼 | 마법 명중 |\n\n---\n\n## 4. 매일 챙길 루틴\n\n| 루틴 | 체크 |\n|---|---|\n| 일일 퀘스트 | 기본 보상과 아티팩트 강화석 확보 |\n| 일반 던전 | 골드, 강화 주문서, 트리니티 파밍 |\n| 암거래 | 유물, 세피라 소환권, 컬렉션 재료 확인 |\n| 초상화 복원제 구매 | 골드 상점에서 꾸준히 구매 |\n| 컬렉션 등록 | 명중·공격력 위주로 즉시 반영 |\n| 서포트 모드 | Lv.46 이후 취침·외출 시간 활용 |\n\n---\n\n## 5. 트리니티 사용 우선순위\n\n트리니티는 사용처가 많으므로 초반 낭비를 피해야 합니다.\n\n| 단계 | 추천 사용처 |\n|---|---|\n| 초반 | 세공, 필요한 장비 제작, 핵심 성장 재료 |\n| 중반 | 규율, 마력 연구, 장비 축복 |\n| 후반 | 고등급 장비 세공, 세피라·내실 심화 |\n\n원칙: 현재 막힌 사냥터의 원인이 명중인지, 공격력인지, 생존력인지 먼저 보고 투자합니다.\n\n---\n\n## 6. 실수 방지\n\n- 안전 강화 수치를 모르고 강화하지 않기\n- 내 클래스와 다른 명중 타입에 투자하지 않기\n- 트리니티를 충동적으로 소모하지 않기\n- 전투력 숫자만 보고 HP·회피 위주로 투자하지 않기\n- 컬렉션 등록 가능한 장비를 무작정 판매하지 않기\n- 공식 업데이트 이후 바뀐 해금 조건은 업데이트 탭에서 확인하기\n"},{"id":"newbie","title":"뉴비 완전 공략","kind":"입문","source":"vampir_newbie_guide.md","content":"# 🧛 뱀피르(VAMPIR) 뉴비 완전 공략 가이드\n\n> **게임**: 넷마블 뱀피르: 피의 계승자 (2025.08.26 출시)  \n> **대상**: 리니지라이크 MMORPG를 처음 접하는 유저 포함 전체 뉴비  \n> **정보 출처**: 공식 가이드(guide.netmarble.com/thered), 게임메카 국민트리, 게임톡, 게임뷰, 공식 개선현황판  \n> **주의**: 아래 내용은 여러 공식 소스를 교차 검증한 신뢰도 높은 정보만 수록했습니다.  \n> **최종 업데이트 기준**: 2026년 4월\n\n---\n\n## 📋 목차\n\n1. [뱀피르란 무엇인가 — 리니지라이크 처음이라면 먼저 읽기](#1-뱀피르란-무엇인가)\n2. [시작 전 필수 설정](#2-시작-전-필수-설정)\n3. [클래스 선택 가이드](#3-클래스-선택-가이드)\n4. [재화 완전 해설 — 무엇으로 무엇을 하나](#4-재화-완전-해설)\n5. [초반 성장 루트 — 레벨별 우선순위](#5-초반-성장-루트-레벨별)\n6. [핵심 능력치 — 명중이 왜 중요한가](#6-핵심-능력치--명중)\n7. [장비 강화 가이드](#7-장비-강화-가이드)\n8. [성장 시스템 우선순위](#8-성장-시스템-우선순위)\n9. [일일 데일리 루틴](#9-일일-데일리-루틴)\n10. [주요 콘텐츠 입문 가이드](#10-주요-콘텐츠-입문-가이드)\n11. [뉴비가 자주 하는 실수](#11-뉴비가-자주-하는-실수)\n12. [용어 사전](#12-용어-사전)\n\n---\n\n## 1. 뱀피르란 무엇인가\n\n### 리니지라이크 처음이라면 먼저 읽기\n\n**리니지라이크 MMORPG**란 레벨을 올리고, 장비를 강화하며, 다른 유저들과 경쟁하는 방식의 게임입니다. 뱀피르도 이 장르지만, 몇 가지 차별점이 있습니다.\n\n#### 뱀피르의 핵심 특징\n\n| 특징 | 설명 |\n|------|------|\n| **PvP/PvE 분리** | 일반 필드는 안전한 PvE 사냥터, 게헨나만 PvP 격전지 |\n| **셔플링 시스템** | 쟁탈전·게헨나 상대 서버가 주기적으로 바뀌어 고착화 방지 |\n| **파밍 다이아** | 사냥만 해도 얻을 수 있는 인게임 재화 (현금 아님) |\n| **트리니티** | 성장의 핵심 재화. 거래 불가, 직접 플레이로만 획득 |\n| **자동 사냥** | 서포트 모드(Lv.46 개방 이후)로 오프라인 사냥 가능 |\n| **클랜 쟁탈전** | 클랜 간 최강 클랜을 가리는 PvP 이벤트 |\n\n#### 게임의 큰 흐름\n\n```\n레벨업 (메인 퀘스트) → 장비 강화 → 내실 성장 (컬렉션/세피라 등) → 엔드 콘텐츠\n```\n\n뱀피르는 **메인 퀘스트를 따라가면 자연스럽게 성장**하도록 설계되어 있습니다. 처음에는 메인 퀘스트 위주로 진행하면 됩니다.\n\n---\n\n## 2. 시작 전 필수 설정\n\n게임을 시작하자마자 설정을 바꾸면 효율이 크게 달라집니다.\n\n### 전투 설정 (최우선)\n\n**[설정] → [전투] → 사냥 범위 10m로 변경**\n\n- 기본값으로 두면 캐릭터가 멀리 있는 몬스터를 쫓아 온 맵을 뛰어다닙니다\n- 범위를 10m로 줄이면 몬스터가 리젠되는 자리에 고정되어 사냥 효율이 크게 올라갑니다\n\n**[설정] → [편의] → 자동 물약 사용 ON**\n\n- 자동 사냥 중 HP가 줄어들면 자동으로 물약을 사용합니다\n\n**[설정] → [편의] → 매너 모드 OFF (사냥 목적이라면)**\n\n- 매너 모드는 다른 유저의 몬스터를 빼앗지 않는 설정입니다\n- 단독 사냥 시 OFF가 효율적입니다\n\n**[설정] → [연출 설정] → 카메라 흔들림 OFF**\n\n- 화면 흔들림으로 멀미가 오는 경우 반드시 끄세요\n\n### 첫 접속 시 할 일\n\n1. 쿠폰 입력 — 공식 SNS, 카카오 채널 구독 쿠폰 확인 후 입력 (우편함으로 보상 수령)\n2. 탈것 장착 — 사전등록 보상 탈것이 있다면 즉시 장착 (경험치 +6% 효과)\n3. 메인 퀘스트 시작 — 화면 우측 퀘스트 정보에서 수락\n\n---\n\n## 3. 클래스 선택 가이드\n\n뱀피르에는 현재 5개 클래스가 있습니다. 나중에 **클래스 변경** 기능이 있어 영구적인 선택은 아닙니다.\n\n### 클래스별 특징\n\n| 클래스 | 무기 | 전투 스타일 | 입문 난이도 | 추천 대상 |\n|--------|------|-------------|------------|-----------|\n| **바이퍼** | 오브 | 원거리 마법, 저주 | ★★★ | 마법사 좋아하는 분 |\n| **그림리퍼** | 낫 | 근접 암살, 순발력 | ★★★★ | 빠른 전투 선호 |\n| **블러드스테인** | 검+방패 | 근접 탱커, 방어 | ★★ | 안정적인 플레이 선호 |\n| **카니지** | 총 | 원거리 속공, 연사 | ★★★ | 원거리 딜러 선호 |\n| **아카샤** | 톤파 | 근접 추격, 디버프 해제 | ★★★★ | 독특한 메커니즘 선호 |\n\n### 명중 타입 (중요!)\n\n클래스마다 필요한 명중 타입이 다릅니다.\n- **블러드스테인·그림리퍼**: 근거리 명중\n- **카니지**: 원거리 명중\n- **바이퍼**: 마법 명중\n- **아카샤**: 근거리 명중\n\n> **⚠️ 주의**: 클래스에 맞는 명중 타입에 투자해야 합니다. 엉뚱한 명중을 올리면 낭비입니다.\n\n---\n\n## 4. 재화 완전 해설\n\n뱀피르를 이해하려면 재화 구조를 먼저 파악해야 합니다.\n\n### 주요 재화 종류\n\n| 재화 | 설명 | 획득처 | 주요 사용처 |\n|------|------|--------|------------|\n| **골드** | 기본 화폐 | 퀘스트, 사냥, 던전 | 스킬북 구매, NPC 거래, 제작 |\n| **파밍 다이아** | 인게임 재화 | 사냥(주간 상한 있음), 퀘스트 | 상점 상품 구매, 강화 비용 |\n| **일반 다이아** | 과금 재화 (현금 구매) | 현금 구매 또는 거래소 아이템 판매 | **거래소에서만 사용 가능** |\n| **트리니티** | 핵심 성장 재화 | 사냥, 퀘스트, 던전, 게헨나 | 세공, 규율, 장비 제작, 축복 |\n| **암흑 상단 주화** | 암거래 화폐 | 암거래 교환 | 컬렉션 아이템, 세피라 소환권, 유물 상자 |\n| **영원의 주화** | 특수 화폐 | 던전, 이벤트 | NPC 상점에서 특정 아이템 구매 |\n| **아티팩트 강화석** | 아티팩트 강화용 | 일일 퀘스트, 던전 | 아티팩트 강화 |\n| **마력 구슬** | 마력 연구용 | 각 던전 | 마력 연구 단계 진행 |\n\n### 재화 우선순위 법칙\n\n> **트리니티는 사용처가 매우 많습니다.** 처음엔 부장품 강화와 세공에 우선 사용하고, 여유가 생기면 장비 제작과 규율 각인에 씁니다. 충동적으로 낭비하지 마세요.\n\n> **파밍 다이아 ≠ 일반 다이아**: 거래소는 일반 다이아만 사용합니다. 파밍 다이아는 인게임 상점, 강화, 콘텐츠 비용에 씁니다.\n\n---\n\n## 5. 초반 성장 루트 (레벨별)\n\n### Lv.1~30 — 메인 퀘스트 위주\n\n**이 구간의 목표**: 최대한 빠르게 레벨업\n\n- **메인 퀘스트를 최우선**으로 진행합니다\n- 서브 퀘스트는 여유가 될 때 병행 (나중에 인물 도감 완성 보상을 받으므로 미루지 마세요)\n- 초반에 지급되는 **직업 초상화 복원제**로 초상화 해금 — 무료로 능력치 상승\n- 이 구간에서 획득하는 장비는 분해 또는 컬렉션 등록에 활용\n\n**신경 써야 할 것**:\n- 스킬북 구매: 골드가 쌓이면 마을 NPC에서 본인 클래스 스킬북 구매\n- 자동 전투 ON — 전투 탭에서 AUTO 활성화\n\n---\n\n### Lv.30~46 — 던전 해금 & 장비 기반 다지기\n\n**이 구간의 목표**: 장비 강화 기반 마련 + 컬렉션 채우기\n\n- **일일 던전** 매일 이용 (기본 이용 시간 내에서 빛바랜 유산 던전 위주)\n  - 강화 주문서, 골드, 트리니티 파밍 가능\n- **컬렉션 시작**: 일반·고급 장비부터 등록 — 등록 즉시 명중 등 능력치 상승\n- **암거래** 매일 확인 — 목록 갱신 시간에 맞춰 교환품 제출\n- **아티팩트 해금**: 에피소드 1 메인 퀘스트 완료 시 오픈 → 아티팩트 강화석 아끼지 말고 꾸준히 강화\n\n**신경 써야 할 것**:\n- 인물 도감 오픈 — 각 영지 첫 메인 퀘스트 완료 시 오픈, 서브 퀘스트로 채워나가기\n- 상점에서 초상화 복원제를 골드로 매일 100개 구매 (조금씩 꾸준히)\n\n---\n\n### Lv.46~60 — 서포트 모드 & 세피라 시작\n\n**이 구간의 목표**: 서포트 모드 활용 + 세피라 세팅 시작\n\n- **Lv.46 이후 서포트 모드 오픈**: 에피소드 2 메인 퀘스트 완료 후 해금\n  - 오프라인 상태에서도 자동 사냥 (잠잘 때, 출근 시 활용)\n  - '올가의 은총' 보유 시 자동 정비(자동 물약 구매, 아이템 보관 등) 기능 추가\n- **Lv.48 세피라 오픈**: 아칠루트 세피라 각인 시작\n- **에픽 던전** 주 3회 무료 입장 — 협동 보스 처치로 협력의 증표(컬렉션) 획득\n- **규율** 시작: 트리니티로 각인. 처음엔 2슬롯 맥스를 먼저 노리기\n- **혈계 진화** 시작 (진화석 수급 시)\n\n**신경 써야 할 것**:\n- 사냥 범위 최적화 확인\n- 이 구간부터 골드 관리가 중요해집니다. 스킬북 가격이 높아지므로 신중히 구매\n\n---\n\n### Lv.60 이상 — 중후반 내실 다지기\n\n**이 구간의 목표**: 내실 성장 + 클랜 가입 + 게헨나 입문\n\n- **Lv.60 브리아 세피라 오픈**\n- **클랜 가입** — 클랜 임무(주 1회), 묘실 RP 버프, 클랜 금고 아이템 공유 혜택\n- **절대 규율** 오픈 (Lv.60, 각인서 소모 방식)\n- 장비를 영웅 등급 이상으로 업그레이드 목표 설정\n- **게헨나 입장** — 트리니티 수급, 게헨나 포인트 → 트리니티 주머니 교환\n- 부캐릭터(부캐) 활용 시작 — 부캐로 트리니티 수급 후 본캐 장비 세공/축복에 사용\n\n---\n\n## 6. 핵심 능력치 — 명중\n\n### 명중이 왜 가장 중요한가?\n\n뱀피르에서 **명중**이 부족하면 공격이 몬스터에게 '빗나감'으로 뜹니다. 공격력이 아무리 높아도 빗나가면 피해가 0입니다. 즉, **명중은 공격이 '실제로 들어가는가'를 결정하는 기반 스탯**입니다.\n\n상위 사냥터로 올라갈수록 몬스터의 레벨이 높아지고, 명중 요구치도 올라갑니다. 사냥터 레벨에 맞는 명중을 확보하지 못하면 사냥 효율이 크게 떨어집니다.\n\n### 명중 종류\n\n| 명중 종류 | 설명 |\n|-----------|------|\n| **일반 명중** | 일반 공격 명중. 모든 클래스 해당 |\n| **스킬 명중** | 스킬 사용 시 명중. 모든 클래스 해당 |\n| **근거리 명중** | 블러드스테인·그림리퍼·아카샤 필요 |\n| **원거리 명중** | 카니지 필요 |\n| **마법 명중** | 바이퍼 필요 |\n\n> **원칙**: 내 클래스에 맞는 특화 명중 + 일반 명중 + 스킬 명중을 모두 챙겨야 합니다.\n\n### 명중 확보 방법 (효율 순서)\n\n#### ① 컬렉션 (가장 빠름)\n\n장비를 보유하고 있다면 즉시 명중 스탯 상승. 가장 빠른 명중 확보 수단입니다.\n- 일반·고급 등급부터 등록\n- 강화 단계를 요구하는 컬렉션은 안전 강화 구간+1~2단계 이내만 사용\n\n#### ② 장비 강화\n\nT1 희귀 등급 기준으로 **무기, 투구, 장갑, 반지, 밤의 성배** 강화 시 명중 상승.\n- 반지는 명중을 가장 쉽게 올릴 수 있는 장비 부위\n- 밤의 성배(유일 장비)에도 기본 옵션으로 명중 포함\n\n#### ③ 세공\n\n트리니티 소모 후 반지, 밤의 성배 세공에서 명중 옵션 획득 가능.\n- T1 희귀 장비 기준 반지에서만 명중 나옴\n- 유일 장비: 밤의 향기(스킬 명중), 밤의 성배(일반 명중)\n\n#### ④ 규율·마력 연구·아티팩트\n\n명중 올릴 수 있지만 재화가 제한적. 장기 관점에서 꾸준히 투자.\n\n#### ⑤ 초상화\n\n초상화 복원 단계마다 다양한 스탯 상승 포함. 꾸준히 복원 진행.\n\n### 명중 투자 원칙\n\n- 현재 사냥터에서 빗나감이 뜨지 않는 수준까지 명중 확보 → 그 이후엔 공격력 투자\n- 명중만 무한정 올린다고 좋은 게 아님 — 명중은 딜로스를 줄일 뿐, 딜 고점을 올리진 않음\n- 최소 명중 확보 후 공격력, 방어력 균형 유지\n\n---\n\n## 7. 장비 강화 가이드\n\n### 강화 기본 원칙\n\n#### 안전 강화 구간이란?\n각 장비에는 '안전 강화 수치'가 있습니다. 이 수치 이내로 강화하면 실패해도 장비가 파괴되지 않습니다. **안전 강화 구간을 절대 모르는 채로 강화하지 마세요.** 강화 실패 시 장비가 완전히 파괴됩니다.\n\n#### 강화 주문서 종류\n\n| 주문서 | 특징 |\n|--------|------|\n| **일반 강화 주문서** | 성공 시 +1 단계 상승 |\n| **축복받은 강화 주문서** | 성공 시 +1 또는 대성공(+2) |\n| **저주받은 강화 주문서** | 사용 시 -1 단계 하락 (주의!) |\n\n#### 강화 결과 종류\n\n| 결과 | 설명 |\n|------|------|\n| **대성공** | +2 상승, 능력치 상승 |\n| **성공** | +1 상승, 능력치 상승 |\n| **파괴** | 장비 완전 삭제 (복구 불가) |\n| **보존** | 실패했으나 장비 유지 |\n\n> **⚠️ 절대 주의**: 안전 강화 수치를 초과한 강화는 파괴 위험이 있습니다. 파괴된 장비는 영구 소멸합니다.\n\n### 장비 투자 우선순위\n\n일반적으로 명중이 붙는 부위를 먼저 강화합니다.\n\n**명중 포함 장비 (우선 강화)**:\n- 무기 → 투구 → 장갑 → 반지 순서 권장\n\n**목걸이**: 명중 옵션 없음, 회피/PvP 피해 증폭 관련 (나중에 투자)\n\n### 축복 시스템\n\n희귀 등급 이상 장비에 트리니티를 대량 소모해 추가 옵션 부여.\n- **성공률 고정 20%**\n- 실패해도 장비 파괴 없음\n- 축복 장비는 강화 단계 2단계 높은 일반 장비와 비슷한 효과\n- 예시: 10강 축복 무기 vs 12강 일반 무기 → 가격 비교 후 효율적인 쪽 구매\n\n### 세공 시스템\n\n트리니티 소모 후 장비에 랜덤 추가 옵션 부여.\n\n| 장비 등급 | 세공 옵션 슬롯 수 |\n|-----------|-----------------|\n| 희귀 | 2개 |\n| 영웅 | 3개 |\n| 전설 | 3개 |\n| 신화(유일) | 5개 (부장품은 4개) |\n\n**세공 부위별 특성**:\n- **무기**: 딜 관련 옵션\n- **방어구**: 생존 관련 옵션\n- **장신구**: 부위마다 다름 (반지 → 명중 다수, 귀걸이·팔찌·벨트 → 공격력 관련)\n\n**세공 팁**:\n- 당첨 목표 옵션: 추가 공격력, 추가 피해 (가장 범용적)\n- 자동 세공 기능으로 원하는 옵션 뜰 때까지 자동 진행 가능\n- 좋은 옵션이 뜨면 즉시 '저장' 기능으로 세이브 (나중에 불러오기 가능)\n- 트리니티 소모처가 많으므로 극옵 추구보다 적당한 타협 권장\n\n---\n\n## 8. 성장 시스템 우선순위\n\n### 초반 투자 우선순위 (요약)\n\n```\n컬렉션 > 초상화 > 아티팩트 > 규율 > 마력 연구 > 세피라 > 혈계 진화 > 영묘\n```\n\n이 순서는 투자 대비 효과와 재화 접근성을 기준으로 한 권장 순서입니다.\n\n---\n\n### 컬렉션 — 가장 즉각적인 효과\n\n장비·유물·수집품을 등록하면 즉시 능력치 반영. 명중과 공격력 위주 컬렉션 먼저 채우세요.\n\n**컬렉션 아이템 획득처**:\n- 일반 던전: 창조의 증표, 빛바랜 증표, 고대의 증표\n- 에픽 던전: 협력의 증표 (일반~영웅)\n- 서브 퀘스트: 인물 도감 완성 시 일지 → 컬렉션 등록용\n- 암거래: 암흑 상단 계약서 구매\n\n**우선순위 컬렉션 옵션**: 일반/스킬/몬스터 공격력(공), 일반/스킬/몬스터 명중(명) > HP·회피 등 방어 관련 (나중에 채워도 됨)\n\n**유물 획득**: 암흑 상단 주화로 '고대 유물 상자' 구매가 현재 유일한 경로 → 암거래 꾸준히 참여 필수\n\n---\n\n### 초상화 — 확정 스탯, 무조건 챙기기\n\n초상화 복원제 소모 → 10단계 해금 완료 → 장착 가능. 한 번 복원하면 영구 능력치 상승.\n\n**복원제 획득처**:\n- 초반 퀘스트 보상 (직업 복원제 지급)\n- **상점 → 교환 → 골드**: 클래스 초상화 복원제 상자 매일 100개 구매 가능 (골드 소모)\n- 에픽 던전, 이벤트 보상\n\n> **핵심 팁**: 골드가 남는 대로 상점에서 복원제 매일 구매 → 꾸준히 투자하면 큰 스탯 차이 만들어짐\n\n---\n\n### 아티팩트 — 꾸준한 투자가 쌓이는 시스템\n\n에피소드 1 메인 퀘스트 완료 후 해금. 강화석 소모로 단계 올릴수록 공격력·명중 등 주요 능력치 상승.\n\n- 강화 진행 시 성공 또는 실패 확률적으로 결정 (1~3단계 상승)\n- 자동 강화 기능으로 목표 레벨까지 자동 진행 가능\n- 재화가 부족해도 조금씩 꾸준히 투자가 정석\n\n---\n\n### 규율 — 트리니티 투자, 장기 성장\n\n트리니티 소모로 3슬롯에 무작위 능력치 각인. **3개 슬롯 모두 최대치 시 추가 보너스** 발동.\n\n**무과금 전략**:\n1. 두 줄(슬롯)을 최대치(맥스)로 먼저 맞추기\n2. 나머지 한 줄도 점진적으로 맥스 추구\n3. 특정 옵션 고정 후 나머지만 재각인 (잠금 기능 활용, 단 비용 증가)\n4. 자동 각인 기능 활용\n\n**Lv.60 이후 절대 규율 추가**: 각인서 소모, 슬롯 등급(일반~영웅)이 존재하며 등급은 하락하지 않음\n\n---\n\n### 마력 연구 — 던전에서 구슬 수급\n\n각 던전에서 마력 구슬 획득 → 플라스크에 주입 → 추가 효과 획득. 단계 성공 시 다음 단계 플라스크 개방.\n\n---\n\n### 세피라 — Lv.48 이후 핵심 성장\n\n**세피라 종류**: 아칠루트(Lv.48), 브리아(Lv.60), 예치라(별도 조건)\n\n**세피라 문양별 효과**:\n| 문양 | 주요 효과 |\n|------|-----------|\n| 알파 | 일반 공격력 / 명중 (아칠루트 세트 효과) |\n| 시그마 | 스킬 공격력 / 스킬 명중 |\n| 세타 | 일반 몬스터 공격력 / 경험치 (초반 레벨업에 유리) |\n| 카파 | PvP 공격력 (PvP 위주 유저) |\n\n**아칠루트 세피라 세팅 권장**:\n- **알파 세트** 최우선: 세트 효과가 '명중'으로 스킬·몬스터·PvP 모두에 영향\n- 초반에 경험치 효율이 필요하다면 세타도 고려\n\n**브리아 세피라**: 방어력 기본 효과, 세트 효과는 피해량 내성\n\n**세피라 합성 원칙**:\n- 연결 효과는 장착한 세피라 중 가장 낮은 등급을 기준으로 적용\n- 따라서 최저 등급을 높이는 것이 핵심\n\n**세피라 획득처**: 암흑 상단 주화로 소환권 구매, 제작\n\n---\n\n### 혈계 진화 — 진화석 확보 후 시작\n\n진화석으로 세포를 진화시켜 추가 능력치 획득. 행(Row) 선택 후 진화 시도 → 확률로 세포 성장.\n\n- 같은 세포 중복 시 해당 세포 레벨 상승\n- 완성 효과: 연결된 열의 모든 세포가 최소 Lv.1 달성 시 발동\n\n---\n\n## 9. 일일 데일리 루틴\n\n매일 아래 콘텐츠를 챙기면 다른 유저와의 격차를 줄일 수 있습니다.\n\n### 매일 (일일)\n\n| 항목 | 내용 | 우선도 |\n|------|------|--------|\n| **일일 퀘스트** | 경험치·골드·트리니티·아티팩트 강화석 획득 | 최상 |\n| **일반 던전** | 기본 이용 시간 소진 (강화 주문서, 골드, 컬렉션 아이템) | 최상 |\n| **암거래** | 교환 가능한 품목 확인 후 제출 (갱신 시간 확인) | 상 |\n| **초상화 복원제 구매** | 상점→교환→골드에서 100개 매일 구매 | 상 |\n| **서포트 모드** | 오프라인 시간(취침·출근)에 활용 | 상 |\n| **아티팩트 강화** | 강화석 모이면 진행 | 중 |\n\n### 매주 (주간)\n\n| 항목 | 내용 | 우선도 |\n|------|------|--------|\n| **에픽 던전** | 주 3회 무료 입장, 협력 보스 처치 | 최상 |\n| **클랜 임무** | 주 1회 (클랜 3레벨+, 최대 50인) | 상 |\n| **쟁탈전** | 참여 시 시즌 랭킹 포인트 획득 | 클랜 가입 후 |\n\n### 수시로\n\n- **거래소 시세 확인**: 장비 판매 타이밍 포착\n- **서브 퀘스트**: 인물 도감 완성 → 에피소드 보상 수령\n- **피의 관문 활성화**: 탐험하며 새 사냥터 스팟 개방\n\n---\n\n## 10. 주요 콘텐츠 입문 가이드\n\n### 일반 던전\n\n- 매일 기본 이용 시간 제공 (던전 초기화 일정에 따라 갱신)\n- **빛바랜 유산 던전**: 강화 주문서, 골드 파밍 핵심\n- **창조의 시면**: 마력 구슬, 아티팩트 강화석 재료 드랍\n- 시간 충전석으로 추가 이용 가능\n\n### 에픽 던전\n\n- 특정 보스가 있는 파티 전용 던전\n- 주 3회 무료 입장 (전 에픽 던전 공용)\n- 파티 생성 또는 자동 매칭으로 입장\n- **협력의 증표(컬렉션 재료) 획득** 가능 — 정기적으로 참여 권장\n\n### 클랜\n\n**클랜 가입을 서두르세요.** 클랜 가입 시 다음 혜택이 있습니다:\n- **묘실**: 클랜원 RP에 따라 추가 능력치\n- **클랜 임무**: 주 1회 협동 보스 — 개인 보상 + 클랜 보상\n- **클랜 금고**: 아이템 공유·분배 가능\n- **클랜 기부**: 골드 기부 → 클랜 레벨 상승 → 가입 인원 증가 등 혜택\n\n> **주의**: 클랜에 가입한 지 24시간이 지나지 않으면 쟁탈전 참여 불가\n\n### 게헨나 (PvP 격전지)\n\n- 입장권을 사용해 입장하는 PvP+PvE 콘텐츠\n- **트리니티와 게헨나 포인트** 획득 핵심 경로\n- 게헨나 포인트 → 트리니티 주머니 교환 (게헨나 포인트 상인)\n- 최대 200인 동시 입장 제한\n- 초보자는 레벨과 전투력이 어느 정도 갖춰진 후 참여 권장\n\n### 암거래\n\n- 매주 갱신되는 교환 목록 확인\n- 교환 품목마다 교환 가능 횟수 제한 있음\n- 획득 주화로 **암흑 상단 계약서(컬렉션)**, **고대 유물 상자**, **세피라 소환권** 구매\n- 유물 아이템은 암거래 외 획득 경로가 없으므로 매주 꾸준히 참여 필수\n\n### 쟁탈전\n\n- 서버 내 클랜 전투력 상위 3개 클랜이 전초전 참여\n- 전초전 1위 클랜이 결승전 진출\n- 클랜 수준의 콘텐츠 — 개인 참여 조건: 클랜 가입 24시간 이상\n\n---\n\n## 11. 뉴비가 자주 하는 실수\n\n### ❌ 안전 강화 수치 무시하고 강화하기\n→ 장비 파괴됩니다. 강화 전 반드시 안전 강화 수치 확인.\n\n### ❌ 전투력(투력) 수치만 보고 장비 결정\n→ 뱀피르에서 전투력은 참고지표일 뿐입니다. HP·회피 등 '뻥투력'이 많이 포함됩니다. 실전에서 중요한 것은 명중·공격력입니다.\n\n### ❌ 트리니티를 초반에 불필요하게 소모\n→ 트리니티 사용처가 매우 많습니다. 부장품 강화와 세공을 먼저, 그다음 규율·제작 순서로 사용하세요.\n\n### ❌ 컬렉션을 나중으로 미루기\n→ 컬렉션은 등록 즉시 영구 능력치 상승. 빨리 채울수록 효율적입니다.\n\n### ❌ 서브 퀘스트 무시\n→ 서브 퀘스트 → 인물 도감 완성 → 에피소드 보상 수령. 꽤 좋은 성장 보상을 제공합니다.\n\n### ❌ 명중 투자를 너무 많이 하거나 아예 안 하기\n→ 사냥터에서 빗나감이 뜨지 않을 정도까지만 명중 확보. 그 이후엔 공격력 투자. 균형이 중요합니다.\n\n### ❌ 세피라·유물 콘텐츠를 모르고 지나치기\n→ 세피라(Lv.48)와 유물(암거래)은 눈에 잘 안 띄지만 전투력에 큰 영향. 챙기지 않으면 손해.\n\n### ❌ 초상화 복원제를 안 사는 것\n→ 매일 상점에서 골드로 구매 가능한 복원제를 꾸준히 사지 않으면 다른 유저에 비해 능력치가 뒤처집니다.\n\n### ❌ 퀵슬롯에 스킬을 등록 안 하기\n→ 스킬 획득 후 퀵슬롯에 등록해야 자동 사냥 시 사용됩니다. 스킬 자동 사용 순서도 설정하세요.\n\n---\n\n## 12. 용어 사전\n\n리니지라이크를 처음 접하는 분들을 위한 용어 정리입니다.\n\n| 용어 | 설명 |\n|------|------|\n| **투력** | 전투력의 줄임말. 캐릭터 종합 스펙 수치 |\n| **뻥투력** | 실전에 도움 안 되는 스탯으로 전투력만 높이는 현상 |\n| **내실** | 전투력 외 실제 전투에 영향을 주는 스탯 (명중, 공격력 등) |\n| **숙제** | 매일/매주 챙겨야 할 정해진 콘텐츠 루틴 |\n| **파밍** | 사냥이나 던전에서 아이템·재화를 수집하는 행위 |\n| **쌀먹** | 게임 재화를 현금화하거나 효율적으로 재화를 파밍하는 것 |\n| **컨텐츠** | '콘텐츠'의 게임 커뮤니티 표현 |\n| **겹사** | 같은 몬스터를 여러 유저가 함께 공격하는 방식 (효율↑) |\n| **꿀자리** | 몬스터가 자주 리젠되어 사냥 효율이 높은 위치 |\n| **리젠** | 몬스터가 다시 생성되는 것 (respawn) |\n| **강화석** | 강화에 사용하는 재료 (아티팩트 강화석 등) |\n| **안전강화** | 강화 실패 시 장비가 파괴되지 않는 구간 |\n| **세공** | 장비에 추가 옵션을 붙이는 행위 |\n| **각인** | 규율 시스템에서 능력치를 새기는 행위 |\n| **부캐** | 부캐릭터. 메인 캐릭터(본캐) 외 추가로 키우는 캐릭터 |\n| **본캐** | 메인으로 플레이하는 캐릭터 |\n| **T1·T2** | 장비 티어 (T1 < T2 < T3). 숫자가 높을수록 상위 |\n| **PvE** | 플레이어 vs 환경 (몬스터 사냥) |\n| **PvP** | 플레이어 vs 플레이어 (다른 유저와 전투) |\n| **쟁** | 게헨나나 쟁탈전에서의 클랜 간 PvP 전투 |\n| **셔플링** | 쟁탈전·게헨나의 매칭 서버를 재편성하는 시스템 |\n| **서포트 모드** | 오프라인 자동 사냥 기능 (Lv.46+ 에피소드 2 클리어 후) |\n\n---\n\n## ✅ 검토 결과 — 틀린 내용 점검\n\n본 가이드 작성 전 다음 항목들을 공식 소스와 교차 검증했습니다.\n\n| 항목 | 검증 결과 |\n|------|-----------|\n| 세피라 해금 레벨 (48레벨) | ✅ 공식 가이드 및 게임메카 국민트리 확인 |\n| 에픽 던전 주 3회 무료 | ✅ 공식 가이드 확인 |\n| 서포트 모드 Lv.46 이후 + 에피소드 2 조건 | ✅ 공식 가이드 확인 |\n| 강화 주문서 종류 및 효과 | ✅ 공식 가이드 확인 |\n| 세공 슬롯 수 (희귀 2개, 영웅·전설 3개, 신화 5개) | ✅ 공식 가이드·게임톡 확인 |\n| 규율 3슬롯 최대치 시 추가 보너스 | ✅ 공식 가이드 확인 |\n| 명중 타입 분류 (근·원·마법) | ✅ 게임메카 국민트리 확인 |\n| 아칠루트 세피라 알파 세트 효과=명중 | ✅ 게임메카 국민트리 확인 |\n| 클랜 임무 3레벨 이상·주 1회·50명 | ✅ 공식 가이드 확인 |\n| 유물 획득처 = 암흑 상단 주화 (암거래)만 가능 | ✅ 게임톡·국민트리 확인 |\n| 절대 규율 Lv.60 이후 오픈 | ✅ 공식 가이드 확인 |\n| 게헨나 최대 200인 입장 | ✅ 공식 가이드 확인 |\n| 쟁탈전 클랜 가입 24시간 미경과 시 참여 불가 | ✅ 공식 가이드 확인 |\n| 파밍 다이아 주간 상한 존재 | ✅ 개발자 발언(개선현황판) 확인 |\n| 트리니티 거래 불가, 플레이만으로 획득 | ✅ 게임뷰 공식 확인 |\n\n**삭제한 불확실 정보**:\n- Vortex Gaming 등 비공식 블로그의 구체적 수치 정보(예: 규율 세부 옵션 슬롯 위치)는 검증 어려워 제외\n- 구체적인 명중 수치 기준값(예: \"80레벨 사냥터에 명중 XXX 필요\")은 업데이트마다 변동되므로 제외\n- 일부 시즌 한정 이벤트 정보(영웅의 서약 등)는 종료 가능성으로 제외\n\n---\n\n*본 가이드는 넷마블 공식 가이드(guide.netmarble.com/thered), 게임메카 국민트리, 게임톡, 게임뷰, 공식 개선현황판을 기반으로 작성되었습니다. 게임 업데이트에 따라 일부 내용이 변경될 수 있습니다.*\n"},{"id":"timeline","title":"레벨별 성장 연표","kind":"성장","source":"vampir_progression_timeline.md","content":"# 뱀피르(VAMPIR) 레벨별 성장 연표\n\n> 기준: 2026년 4월 / 출처: 공식 가이드, 뉴비 가이드, 업데이트 이력 종합  \n> ★ = 해당 구간 최우선 / ☆ = 병행 권장 / · = 가능하면 챙기기\n\n---\n\n## Lv.1 ~ 30 — 기초 진입 구간\n\n**목표**: 최대한 빠른 레벨업, 게임 구조 파악\n\n| 시스템 / 콘텐츠 | 우선도 | 비고 |\n|---|---|---|\n| 메인 퀘스트 | ★ | 전 구간 성장 뼈대. 무조건 최우선 |\n| 자동 전투 설정 | ★ | 퀵슬롯 스킬 등록 + AUTO ON |\n| 사냥 범위 설정 (10m) | ★ | 첫 접속 시 즉시 설정 |\n| 스킬북 구매 | ★ | 마을 NPC에서 골드로 구매 |\n| 컬렉션 등록 | ★ | 장비 획득 즉시 등록 — 명중·공격력 위주 |\n| 서브 퀘스트 | ☆ | 인물 도감 완성 → 에피소드 보상 |\n| 초상화 복원 | ☆ | 초반 퀘스트 지급 복원제 즉시 사용 |\n| 장비 강화 (안전 구간) | ☆ | 안전 강화 수치 반드시 확인 후 진행 |\n| 탈것 장착 | · | 사전등록 보상 탈것 → 경험치 +6% |\n| 쿠폰 입력 | · | 공식 SNS·카카오 채널 쿠폰 우편함 수령 |\n| 업적 | · | 자동 누적, 포인트 보상 |\n\n---\n\n## Lv.30 ~ 46 — 장비 기반 & 던전 입문\n\n**목표**: 장비 강화 기반 마련, 컬렉션 채우기, 재화 루틴 정착\n\n| 시스템 / 콘텐츠 | 우선도 | 비고 |\n|---|---|---|\n| 일반 던전 (빛바랜 유산) | ★ | 매일 기본 이용 시간 소진. 강화 주문서·골드·트리니티 |\n| 컬렉션 확장 | ★ | 일반·고급 등급부터 등록. 명중 계열 우선 |\n| 암거래 | ★ | 매일 확인. 암흑 상단 주화 → 유물·세피라 소환권 교환 |\n| 초상화 복원제 구매 | ★ | 상점→교환→골드, 매일 100개 구매 루틴 |\n| **아티팩트** 해금·강화 | ★ | 에피소드 1 [메인 101. 도착한 미래] 완료 시 오픈 |\n| 장비 강화 (무기·투구·장갑·반지) | ☆ | 명중 포함 부위 우선 강화 |\n| 세공 시작 | ☆ | 반지에서 명중 옵션 노리기 (트리니티 소모) |\n| 인물 도감 완성 | ☆ | 서브 퀘스트 → 에피소드 완성 보상 |\n| 창조의 시면 던전 | ☆ | 마력 구슬·아티팩트 강화석 재료 드랍 |\n| 월드 보스 | · | 참여 보상·기여도 보상 수령 |\n| 피의 형상 / 탈것 | · | 합성·도감 보유 효과 축적 |\n| 거래소 시세 확인 | · | 획득 장비 판매 타이밍 파악 |\n\n---\n\n## Lv.46 ~ 48 — 서포트 모드 & 솔로 챌린지 오픈\n\n**목표**: 오프라인 사냥 체계 구축\n\n| 시스템 / 콘텐츠 | 우선도 | 비고 |\n|---|---|---|\n| **서포트 모드** 해금 | ★ | 에피소드 2 [메인 1. 빛의 기억] 완료 시 오픈. 취침·외출 시 자동 사냥 |\n| **나리찬예 계곡** 입문 | ☆ | Lv.46 이상 이용 가능. 1인 PvE 50단계 챌린지 |\n| 자동 물약·매너 모드 설정 | ★ | 서포트 모드 운영 전 편의 설정 완료 |\n| 컬렉션·던전 루틴 유지 | ★ | 이전 구간 루틴 그대로 유지 |\n\n---\n\n## Lv.48 ~ 60 — 세피라·규율·에픽 본격화\n\n**목표**: 핵심 내실 시스템 가동, 클랜 가입\n\n| 시스템 / 콘텐츠 | 우선도 | 비고 |\n|---|---|---|\n| **세피라 (아칠루트)** | ★ | Lv.48 오픈. 알파 세트(명중) 최우선 각인 |\n| **에픽 던전** | ★ | 주 3회 무료 입장. 협력의 증표(컬렉션 재료) 획득 |\n| **규율** | ★ | 트리니티 소모, 3슬롯 순차적으로 MAX 목표. 2슬롯 먼저 |\n| **마력 연구** | ☆ | 각 던전 마력 구슬 주입 → 플라스크 효과 획득 |\n| **혈계 진화** | ☆ | 진화석 수급 시 시작. 행 선택 → 확률적 세포 성장 |\n| **클랜 가입** | ☆ | 묘실 RP 버프·클랜 임무·금고 혜택 |\n| 장비 영웅 등급 목표 | ☆ | 이 구간부터 희귀→영웅 업그레이드 목표 설정 |\n| 축복 | · | 희귀 이상 장비에 트리니티 대량 소모, 성공률 20% 고정 |\n| 부캐릭터 활용 | · | 부캐로 트리니티 수급 → 본캐 세공·축복에 투입 |\n| 피의 관문 활성화 | · | 새 사냥터 스팟 개방 |\n| 블러드라인 | · | 선지자 캐릭터 던전. 성장 보상 |\n\n---\n\n## Lv.60 이상 — 엔드 콘텐츠 & 심화 내실\n\n**목표**: PvP 참여, 절대 규율 가동, 최종 내실 완성\n\n| 시스템 / 콘텐츠 | 우선도 | 비고 |\n|---|---|---|\n| **절대 규율** | ★ | Lv.60 오픈. 각인서 소모 방식. 등급 한 번 오르면 하락 없음 |\n| **세피라 (브리아)** | ★ | Lv.60 오픈. 방어력 기본 효과, 세트 효과는 피해 내성 |\n| **게헨나** | ★ | 입장권 사용 PvP 격전지. 트리니티·게헨나 포인트 핵심 수급처 |\n| **클랜 임무** | ★ | 클랜 3레벨 이상, 주 1회, 최대 50인 타임어택 보스 |\n| **쟁탈전** | ★ | 클랜 가입 24시간 이후 참여 가능. 클랜 전투력 상위 3개 클랜 진출 |\n| **정예 던전 (광휘의 요람)** | ☆ | 6개 서버 인터서버 PvP+PvE. 주 3시간 기본 제공 |\n| **세피라 (예치라)** | ☆ | 별도 해금 조건 충족 시 |\n| **영묘** | ☆ | 묘지기 파견 → 관 카드 획득 → 안치 효과 (12차 업데이트 추가) |\n| 장비 전설·신화 목표 | ☆ | 세공 5슬롯(신화), 제작 대성공 노리기 |\n| 혈계 진화 완성 | · | 열 단위 완성 효과 발동 목표 |\n| 작위 (시즌 랭킹) | · | 시즌 랭킹 상위권 → 공작~남작 작위 + 스킬 부여 |\n| 나리찬예 계곡 고층 | · | 50단계 완파 목표 |\n\n---\n\n## 전 구간 공통 일일/주간 루틴\n\n| 주기 | 항목 |\n|---|---|\n| **매일** | 일일 퀘스트 · 일반 던전(기본 시간 소진) · 암거래 확인 · 초상화 복원제 100개 구매 · 서포트 모드(취침·외출 시) |\n| **매주** | 에픽 던전 3회 · 클랜 임무(가입 후) · 쟁탈전(클랜 레벨 충족 후) |\n| **수시** | 거래소 시세 확인 · 서브 퀘스트 · 피의 관문 활성화 |\n\n---\n\n## 시스템 해금 요약표\n\n| 시스템 | 해금 조건 |\n|---|---|\n| 아티팩트 | 에피소드 1 [메인 101] 완료 |\n| 서포트 모드 | 에피소드 2 [메인 1] 완료 (Lv.46~) |\n| 나리찬예 계곡 | Lv.46 이상 |\n| 세피라 아칠루트 | Lv.48 |\n| 세피라 브리아 | Lv.60 |\n| 절대 규율 | Lv.60 |\n| 클랜 임무 | 클랜 3레벨 이상, 주 1회 |\n| 쟁탈전 참여 | 클랜 가입 24시간 이후 |\n| 클래스 변경 | Lv.60 (마을에서만 가능) |\n| 영묘 | 12차 업데이트(2026-04-08) 이후 |\n| 정예 던전 | 8차 업데이트(2026-01-21) 이후 |\n\n---\n\n*본 연표는 공식 가이드(guide.netmarble.com/thered), 뉴비 공략 가이드, 업데이트 이력(~2026-04-30)을 종합하여 작성되었습니다.*\n"},{"id":"combat","title":"전투력 & 데일리 루틴","kind":"전투력","source":"vampir_combat_power_guide.md","content":"# 뱀피르(VAMPIR) 전투력 올리기 & 레벨별 데일리 루틴 가이드\n\n> 기준: 2026년 5월 / 출처: 공식 가이드, 게임톡, 게임뷰, 게임메카(국민트리), 공식 개선현황판 종합  \n> ※ 전투력(투력) ≠ 실전 능력치. '내실(명중·공격력)' 위주 투자가 핵심\n\n---\n\n## 목차\n\n1. [전투력 올리기 — 시스템별 우선순위](#1-전투력-올리기--시스템별-우선순위)\n2. [핵심 재화 '트리니티' 사용 순서](#2-핵심-재화-트리니티-사용-순서)\n3. [세피라 세팅 가이드](#3-세피라-세팅-가이드)\n4. [규율 투자 전략](#4-규율-투자-전략)\n5. [레벨별 데일리·주간 루틴](#5-레벨별-데일리주간-루틴)\n\n---\n\n## 1. 전투력 올리기 — 시스템별 우선순위\n\n> 투자 대비 효과 순서. 재화가 한정적일수록 위에서부터 채워나간다.\n\n### 1-1. 내실(실전 능력치) 위주 투자 원칙\n\n뱀피르의 전투력 수치에는 HP·회피 등 '뻥투력' 스탯이 다수 포함된다.  \n실전에서 중요한 것은 **명중 → 공격력** 순서이며, 이 두 스탯을 올려주는 시스템에 우선 투자해야 한다.\n\n```\n명중 확보 (빗나감 0) 달성 → 공격력 투자 → 생존력(방어·HP) 순\n```\n\n---\n\n### 1-2. 시스템별 투자 우선순위표\n\n| 순위 | 시스템 | 해금 조건 | 핵심 효과 | 투자 재화 |\n|------|--------|-----------|-----------|-----------|\n| ① | **컬렉션** | 시작부터 | 즉시 영구 능력치 반영. 명중·공격력 위주 | 장비·유물·수집품 |\n| ② | **초상화** | 시작부터 | 10단계 해금 시 영구 스탯 상승 | 초상화 복원제 + 골드 |\n| ③ | **아티팩트** | 에피소드 1 완료 | 공격력·명중 누적 상승 | 아티팩트 강화석 |\n| ④ | **규율** | 시작부터 (Lv.제한 있음) | 3슬롯 영구 각인. 맥스 시 추가 보너스 | 트리니티 |\n| ⑤ | **절대 규율** | Lv.60 이상 | 등급 상승형 각인, 한번 오른 등급 하락 없음 | 각인서 |\n| ⑥ | **마력 연구** | 던전 해금 후 | 플라스크별 추가 효과 | 마력 구슬 + 트리니티 |\n| ⑦ | **세피라** | Lv.48(아칠루트), Lv.60(브리아), Lv.70(예치라) | 문양별 공격·방어·경험치 보정 | 세피라 소환권·암흑 상단 주화 |\n| ⑧ | **혈계 진화** | 진화석 수급 후 | 세포 개별 효과 + 열 완성 효과 | 진화석 |\n| ⑨ | **영묘** | 12차 업데이트(2026-04-08) 이후 | 관 카드 안치 효과·보유 효과 | 묘지기 파견 증서·관 열쇠 |\n| ⑩ | **피의 형상·탈것 도감** | 시작부터 | 보유·연결·초월 효과 누적 | 소환권·합성 |\n| ⑪ | **장비 강화·세공·축복** | 희귀 등급 이상 | 직접적 스탯 상승. 세공 슬롯: 희귀 2개, 영웅·전설 3개, 신화 5개 | 강화 주문서·트리니티 |\n| ⑫ | **나리찬예 계곡** | Lv.46 이상 | 단계별 보상(경험치·골드 등), 단계 클리어 성장 | 입장 무료 |\n\n---\n\n### 1-3. 장비 강화 부위별 우선순위\n\n```\n명중 포함 부위 먼저: 무기 → 투구 → 장갑 → 반지 → 밤의 성배(유일)\n명중 없는 부위는 나중에: 목걸이 (회피·PvP 피해 증폭 관련)\n```\n\n- **안전 강화 수치 이내** 강화만 진행 (초과 시 파괴 위험, 복구 불가)\n- 축복: 성공률 20% 고정, 실패해도 파괴 없음. 무기 → 투구 → 장갑 → 반지 순\n\n---\n\n### 1-4. 컬렉션 우선 등록 옵션\n\n| 우선도 | 옵션 종류 |\n|--------|-----------|\n| ★ 최우선 | 일반 명중 / 스킬 명중 / 몬스터 명중 |\n| ★ 최우선 | 일반 공격력 / 스킬 공격력 / 몬스터 공격력 |\n| ☆ 다음 | HP / 회피 / 방어력 계열 (사냥 안정 후 채우기) |\n\n- 유물은 **암거래(암흑 상단 주화 → 고대 유물 상자)** 외 획득 경로 없음 → 암거래 매주 필수\n\n---\n\n### 1-5. 부캐릭터 활용 (무·소과금 핵심)\n\n- 부캐는 **컬렉션·탈것·피의 형상 도감 공유** (본캐와 동일 혜택)\n- 트리니티는 캐릭터 귀속 → 부캐 트리니티는 **장비 세공·제작에만** 사용 가능\n- 부캐로 희귀 피의 형상 수집 → 합성하여 영웅 형상 획득 가능\n- 30레벨대 진입 후 던전 파밍 가능 → 재화 수급 속도 대폭 향상\n\n---\n\n## 2. 핵심 재화 '트리니티' 사용 순서\n\n트리니티는 소모처가 매우 많고 수급이 한정적이므로 순서를 반드시 지킨다.\n\n```\n① 부장품 세공 (유효 옵션 2줄 확보, +4 강화 이내)\n② 장비 축복 (무기 최우선 → 투구 → 장갑 → 반지)\n③ 장비 제작 (거래소 시세와 비교 후 결정)\n④ 마력 연구 (최소 1,000개 이상 비축 후 시작. Lv.52 기준 3개 플라스크 완료)\n⑤ 규율 각인 (재화 여유 시 병행)\n```\n\n> ⚠️ 초반에 트리니티를 충동적으로 소모하면 규율·제작 단계에서 재화 부족으로 성장이 막힌다.\n\n---\n\n## 3. 세피라 세팅 가이드\n\n### 3-1. 아칠루트 세피라 (Lv.48 해금)\n\n| 문양 | 주요 효과 | 추천 대상 |\n|------|-----------|-----------|\n| **세타** ⭐ | 일반 몬스터 대상 평타·스킬 공격력 상승, 경험치 보정 | 초보자·사냥 효율 최우선 |\n| 알파 | 평타 공격력 증폭 + 명중 (세트 효과: 명중) | 명중 확보 후 딜 강화 |\n| 시그마 | 스킬 공격력·스킬 명중 증폭 | 스킬 딜러 특화 |\n| 카파 | PvP 공격력 증폭 | PvP 위주 유저 |\n\n### 3-2. 브리아 세피라 (Lv.60 해금)\n\n| 문양 | 주요 효과 | 추천 대상 |\n|------|-----------|-----------|\n| **세타** / **알파** ⭐ | 일반 몬스터 방어력 / 평타 방어력 증폭 | 초반 사냥 최적화 |\n| 시그마 | 스킬 방어력 + 모든 피해 내성 | 후반 생존 최적화 |\n| 카파 | PvP 방어력 증폭 | PK 상황 대비 |\n\n### 3-3. 예치라 세피라 (Lv.70 또는 별도 조건)\n\n| 문양 | 주요 효과 | 추천 대상 |\n|------|-----------|-----------|\n| **세타** ⭐ | 몬스터 공격력 + **경험치 추가 획득** | 레벨업 폭풍 성장 |\n| 알파 | 평타 공격력 + 공격 속도 증가 | 전투 효율 |\n| 시그마 | 스킬 공격력 + 재사용 대기 감소 | 후반부 운용 |\n| 카파 | PvP 공격력 + 상태 이상 저항 | PvP 중심 |\n\n### 3-4. 세피라 세팅 핵심 원칙\n\n- **등급 통일**: 연결 효과는 장착 세피라 중 가장 낮은 등급 기준 적용 → 최저 등급을 높이는 것이 핵심\n- **문양 통일**: 같은 문양으로 맞춰야 세트 효과 발동\n- 콘텐츠(사냥/PvP)에 따라 프리셋 교체 활용\n\n---\n\n## 4. 규율 투자 전략\n\n### 4-1. 기본 규율 (트리니티 소모)\n\n```\n전략: 2슬롯 맥스 먼저 → 나머지 1슬롯 맥스\n      잠금 기능으로 좋은 옵션 고정 후 나머지만 재각인\n```\n\n| 규율 | 슬롯1 (고정) | 슬롯2 우선 옵션 | 슬롯3 우선 옵션 |\n|------|-------------|----------------|----------------|\n| 2번째 | 일반 명중 | 스킬 명중 | 추가 피해 |\n| 3번째 | 스킬 공격력 | 스킬 명중 | 피해 저항 |\n| 4번째 | (확인 후) | 추가 피해 맥스 | 공격력 계열 |\n\n- 3슬롯 전체 MAX 달성 시 **추가 보너스 효과** 발동\n- 자동 각인 기능으로 목표 옵션 뜰 때까지 자동 진행 가능\n\n### 4-2. 절대 규율 (Lv.60 이후, 각인서 소모)\n\n- 각인서 획득처: [상점] → [교환] → [다이아] 또는 마을 영원의 주화 상인\n- 슬롯 등급(일반→고급→희귀→영웅) 확률적 상승, **한번 오른 등급은 하락 없음**\n- 추가 효과 활성화: 모든 슬롯 최소 [일반] MAX 달성 시\n- 슬롯 간 등급 다를 경우 **가장 낮은 등급 기준**으로 추가 효과 적용\n\n---\n\n## 5. 레벨별 데일리·주간 루틴\n\n> 2026년 5월 기준. ★ = 반드시 / ☆ = 가능하면 / · = 여유 시\n\n---\n\n### Lv.1 ~ 30 | 입문 구간\n\n**하루 핵심 목표**: 메인 퀘스트 최대한 진행, 루틴 습관 형성\n\n#### 매일\n| 항목 | 설명 |\n|------|------|\n| ★ 메인 퀘스트 | 레벨업의 핵심. 성장 시스템 순차 해금 |\n| ★ 일일 퀘스트 | 골드·트리니티·아티팩트 강화석 획득 |\n| ★ 컬렉션 등록 | 장비 획득 즉시 등록. 명중/공격력 위주 |\n| ☆ 서브 퀘스트 | 인물 도감 완성 → 에피소드 보상 |\n| ☆ 스킬북 구매 | 마을 NPC에서 골드로 구매 |\n| ☆ 초상화 복원 | 초반 퀘스트 지급 복원제 즉시 사용 |\n| · 쿠폰 입력 | 공식 SNS·카카오 채널 쿠폰 확인 |\n\n#### 필수 초기 설정 (1회)\n- 사냥 범위 10m로 변경\n- 자동 물약 사용 ON\n- 퀵슬롯에 스킬 등록 + AUTO ON\n\n---\n\n### Lv.30 ~ 46 | 던전 입문 & 루틴 정착\n\n**하루 핵심 목표**: 던전 시간 소진, 컬렉션 채우기, 아티팩트 해금\n\n#### 매일\n| 항목 | 설명 |\n|------|------|\n| ★ 일일 퀘스트 | 트리니티·아티팩트 강화석 수급 |\n| ★ 일반 던전 | 빛바랜 유산(강화 주문서·골드) + 창조의 심연(마력 구슬·강화석 재료) |\n| ★ 암거래 확인 | 교환품 제출 → 암흑 상단 주화 수급. 유물 획득 유일 경로 |\n| ★ 초상화 복원제 구매 | 상점 → 교환 → 골드, 매일 100개 |\n| ☆ 컬렉션 확장 | 일반·고급 등급부터 등록 |\n| ☆ 아티팩트 강화 | 에피소드 1 [메인 101] 완료 후 해금. 강화석 모이면 즉시 |\n| ☆ 장비 강화 | 안전 강화 수치 이내, 명중 포함 부위 우선 |\n| · 서브 퀘스트 | 인물 도감 완성 진행 |\n| · 거래소 시세 확인 | 불필요한 장비 판매 |\n\n#### 매주\n| 항목 | 횟수 | 설명 |\n|------|------|------|\n| ★ 에픽 던전 | 3회 | 협력의 증표(컬렉션)·트리니티·희귀 액세서리 |\n| ☆ 고대의 공방 | 주 8시간 | 희귀 무기·방어구·액세서리 파밍 |\n\n---\n\n### Lv.46 ~ 60 | 서포트 모드 & 내실 본격화\n\n**하루 핵심 목표**: 서포트 모드로 오프라인 사냥, 세피라·규율 가동\n\n#### 매일\n| 항목 | 설명 |\n|------|------|\n| ★ 일일 퀘스트 | |\n| ★ 일반 던전 | |\n| ★ 암거래 확인 | |\n| ★ 초상화 복원제 100개 구매 | |\n| ★ 서포트 모드 | 에피소드 2 [메인 1] 완료 후 해금. 취침·외출 시 자동 사냥 |\n| ★ 아티팩트 강화 | 강화석 축적 즉시 투자 |\n| ☆ 세피라 각인 (Lv.48~) | 아칠루트 세타 문양 최우선 |\n| ☆ 규율 각인 | 트리니티 여유분 투자. 2슬롯 맥스 먼저 |\n| ☆ 마력 연구 | 던전 구슬 수급 후 플라스크 주입 |\n| ☆ 혈계 진화 | 진화석 수급 시 시작 |\n| ☆ 나리찬예 계곡 | Lv.46 이후 입장. 단계별 1회 클리어 보상 |\n| · 게헨나 입장 | 전투력 충분 시 입장. 트리니티·게헨나 포인트 |\n| · 클랜 가입 | 묘실 RP 버프·금고 혜택 |\n| · 흰 까마귀 일일 미션 | 2026-04-22~ 진행 중인 성장 지원 이벤트 |\n\n#### 매주\n| 항목 | 횟수 | 설명 |\n|------|------|------|\n| ★ 에픽 던전 | 3회 | |\n| ★ 정예 던전 (광휘의 요람) | 주 3시간 기본 | 인터서버 PvP+PvE. 충전석으로 추가 가능 |\n| ☆ 고대의 공방 | 주 8시간 | |\n| ☆ 클랜 임무 | 1회 | 클랜 3레벨 이상 가입 후 참여 |\n\n---\n\n### Lv.60 이상 | 엔드 콘텐츠 풀 가동\n\n**하루 핵심 목표**: 절대 규율·브리아 세피라 투자, 게헨나·쟁탈전 참여\n\n#### 매일\n| 항목 | 설명 |\n|------|------|\n| ★ 일일 퀘스트 | |\n| ★ 일반 던전 | |\n| ★ 암거래 확인 | |\n| ★ 초상화 복원제 100개 구매 | |\n| ★ 서포트 모드 | |\n| ★ 절대 규율 각인 | Lv.60 해금. 각인서 수급량에 맞게 진행 |\n| ★ 게헨나 입장 | 트리니티·게헨나 포인트 핵심 수급. 포인트 상인 교환(주 20회) |\n| ★ 영묘 파견 | 묘지기 파견 증서 소모 → 관 획득 루틴 |\n| ☆ 세피라 브리아 각인 | 방어력·피해 내성 |\n| ☆ 절대 규율 자동 각인 | 목표 등급·옵션 설정 후 자동 진행 |\n| ☆ 나리찬예 계곡 | 50단계 완파 목표 |\n| ☆ 아티팩트 강화 | |\n| ☆ 혈계 진화 | 열(Column) 완성 효과 발동 목표 |\n| · 흰 까마귀 전투 지원 미션 | 2026-04-22~ 진행 중 |\n| · 부캐릭터 사냥 | 트리니티 추가 수급 → 본캐 세공·축복 투입 |\n\n#### 매주\n| 항목 | 횟수 | 설명 |\n|------|------|------|\n| ★ 에픽 던전 | 3회 | |\n| ★ 정예 던전 | 주 3시간 기본 | 살육의 제단 버프(피해+7%·공속+15%) 선점 노리기 |\n| ★ 클랜 임무 | 1회 (월요일 05시 초기화) | 타임어택 보스. 클랜 3레벨 이상 |\n| ★ 쟁탈전 | 시즌 일정 | 클랜 가입 24시간 이후 참여. 클랜 전투력 상위 3개 클랜 진출 |\n| ☆ 고대의 공방 | 주 8시간 | |\n| ☆ 게헨나 포인트 상인 교환 | 주 20회 | 트리니티 주머니 교환 (84레벨 이상 상품 포함) |\n\n---\n\n## 2026년 5월 현재 진행 중인 이벤트\n\n| 이벤트 | 기간 | 보상 |\n|--------|------|------|\n| 재합성권 출석부 | ~2026-05-13 | 14일 출석 시 형상·탈것 재합성권 |\n| 흰 까마귀의 일일 성장 미션 | 2026-04-22~ | 일일 성장 지원 보상 |\n| 흰 까마귀의 전투 지원 미션 | 2026-04-22~ | 전투 관련 지원 보상 |\n\n---\n\n## 전투력 올리기 요약 — 한눈에 보기\n\n```\n[초반 Lv.1~30]\n컬렉션 등록 → 초상화 복원 → 장비 안전강화 → 스킬북 구매\n\n[중반 Lv.30~46]\n아티팩트 해금·강화 → 컬렉션 확장 → 암거래 주화 → 에픽 던전 3회\n\n[중후반 Lv.46~60]\n서포트 모드 → 세피라 아칠루트(세타) → 규율 2슬롯 맥스 → 마력 연구\n→ 혈계 진화 → 트리니티: 부장품 세공 → 축복 → 제작 → 마력 연구\n\n[엔드 Lv.60+]\n절대 규율 → 브리아 세피라 → 게헨나 포인트 교환 → 영묘 파견\n→ 쟁탈전 참여 → 예치라 세피라 → 나리찬예 계곡 50단계\n```\n\n---\n\n*출처: 넷마블 공식 가이드(guide.netmarble.com/thered), 게임톡, 게임뷰, 게임메카(국민트리), 공식 개선현황판(2026-04-30 기준)*\n"},{"id":"official","title":"공식 가이드 백과사전","kind":"백과","source":"vampir_Official_Guide.md","content":"# 🧛 뱀피르 (VAMPIR) 공식 가이드 백과사전\n\n> 출처: 넷마블 공식 가이드 (https://guide.netmarble.com/thered)\n> ※ 가이드 내용 및 이미지는 테스트 버전을 기준으로 작성되었으며, 실제 게임 화면의 구성과 다르거나 변경될 수 있습니다.\n\n---\n\n## 목차\n\n1. [기본 가이드](#1-기본-가이드)\n   - [메인 화면](#11-메인-화면)\n   - [클래스](#12-클래스)\n2. [캐릭터](#2-캐릭터)\n   - [캐릭터 정보 및 작위](#21-캐릭터-정보-및-작위)\n   - [스킬](#22-스킬)\n   - [랭킹](#23-랭킹)\n3. [형상 / 탈것](#3-형상--탈것)\n   - [피의 형상](#31-피의-형상)\n   - [탈것](#32-탈것)\n4. [성장](#4-성장)\n   - [컬렉션](#41-컬렉션)\n   - [초상화](#42-초상화)\n   - [아티팩트](#43-아티팩트)\n   - [규율 / 절대 규율](#44-규율--절대-규율)\n   - [마력 연구](#45-마력-연구)\n   - [아카이브](#46-아카이브)\n   - [세피라](#47-세피라)\n   - [혈계 진화](#48-혈계-진화)\n5. [장비 강화 / 제작](#5-장비-강화--제작)\n   - [강화](#51-강화)\n   - [세공](#52-세공)\n   - [축복](#53-축복)\n   - [제작](#54-제작)\n6. [퀘스트](#6-퀘스트)\n   - [퀘스트](#61-퀘스트)\n   - [인물도감](#62-인물도감)\n   - [블러드라인](#63-블러드라인)\n7. [업적](#7-업적)\n8. [주요 콘텐츠](#8-주요-콘텐츠)\n   - [던전](#81-던전)\n   - [월드 보스](#82-월드-보스)\n   - [게헨나](#83-게헨나)\n   - [쟁탈전](#84-쟁탈전)\n   - [정예 던전](#85-정예-던전)\n9. [거래소](#9-거래소)\n10. [암거래](#10-암거래)\n11. [클랜](#11-클랜)\n    - [클랜](#111-클랜)\n    - [클랜 임무](#112-클랜-임무)\n12. [침공](#12-침공-영역-침공)\n13. [피의 관문](#13-피의-관문)\n14. [미니맵](#14-미니맵)\n15. [월드맵](#15-월드맵)\n16. [클래스 변경](#16-클래스-변경)\n17. [NPC 상점](#17-npc-상점)\n18. [흡혈](#18-흡혈)\n19. [영묘](#19-영묘)\n20. [나리찬예 계곡](#20-나리찬예-계곡)\n21. [기타](#21-기타)\n    - [서포트 모드](#211-서포트-모드)\n    - [옵션](#212-옵션)\n    - [키셋팅](#213-키셋팅)\n\n---\n\n## 1. 기본 가이드\n\n### 1.1 메인 화면\n\n'뱀피르' 메인 화면의 구성과 기능에 대해 확인할 수 있습니다.\n\n#### 메인 화면 구성\n\n| 번호 | 표기 항목 |\n|------|-----------|\n| 1 | 캐릭터 정보, 버프, 맵 정보, 마을 귀환, 보스 정보, 파티 생성, 공격대 생성 |\n| 2 | 채팅, 절전 모드, 서포트 모드, 카메라 설정 / 레벨, 전투력, 경험치 |\n| 3 | 물약 정보, 아드레날린 게이지 |\n| 4 | 퀵슬롯 (아이템 및 스킬 등록) |\n| 5 | 재화 보유량 |\n| 6 | 이벤트, 상점, 가방, 메뉴 아이콘 |\n| 7 | 퀘스트 정보, 타겟 정보, 전투 기록 |\n| 8 | 타겟, 타겟 변경, 탐지, 자동 진행, 탈것, 대쉬, 공격 |\n\n---\n\n### 1.2 클래스\n\n'뱀피르'에는 총 5가지 클래스가 존재하며, 각 클래스별로 고유의 무기와 고유한 경험을 제공합니다.\n\n#### 바이퍼\n- **키워드**: 오브, 마법, 저주\n- 고대 주술을 사용해 전황을 장악하는 뱀파이어 술사입니다.\n- 의식을 통해 어둠의 힘을 저주로 승화시켰으며, 음험한 저주의 힘으로 녹턴에서 가장 위험적인 존재가 되었습니다.\n\n#### 그림리퍼\n- **키워드**: 낫, 근접, 암살\n- 그림자 낫으로 적을 가르는 뱀파이어 전사이며, 암살에 특화되었습니다.\n- 맞선 이들의 영혼은 어둠의 낫으로 베어져 흔적도 없이 어둠에 잠겼습니다.\n\n#### 블러드스테인\n- **키워드**: 검, 근접, 방어\n- 피로 벼려낸 칼로 전장을 지배하는 뱀파이어 기사입니다.\n- 피를 향한 끝없는 탐욕을 검에 담아 전장의 모든 것을 먹잇감으로 만듭니다.\n\n#### 카니지\n- **키워드**: 총, 원거리, 속공\n- 어둠을 꿰뚫는 총탄으로 길을 여는 뱀파이어 저격수입니다.\n- 공격은 그 어떤 뱀파이어보다도 빠르고 정확하게 적들의 심장을 꿰뚫습니다.\n\n#### 아카샤\n- **키워드**: 톤파, 근접, 추격\n- 칼날이 달린 톤파를 무기로 사용하는 근접 전투에 특화된 클래스입니다.\n- 상대방의 공격력을 강탈하거나, 기절 상태에서도 자신에게 걸린 디버프를 즉시 해제하는 독창적인 전투 메커니즘을 가지고 있습니다.\n\n---\n\n## 2. 캐릭터\n\n### 2.1 캐릭터 정보 및 작위\n\n#### 캐릭터 정보\n- 현재 장착 중인 장비 및 부장품 정보를 확인할 수 있습니다.\n- 전투력과 주요 스텟 정보도 확인 가능합니다.\n- 좌측 하단 UI 버튼을 클릭하여 UI를 ON/OFF 할 수 있습니다.\n\n#### 작위 정보\n- 시즌 랭킹에 따라 작위가 부여되며, 작위 정보 메뉴에서 획득할 수 있습니다.\n- 각 작위별로 능력치 및 시즌 랭크 액티브 스킬이 부여됩니다.\n- 밤의 귀족 명단을 통해 현재 작위를 보유한 계승자 목록이 표기됩니다.\n- 상위 작위를 획득하면 하위 작위 스킬을 모두 사용 가능합니다.\n- 모든 시즌 랭킹 액티브 스킬은 쿨타임을 공유하며, 1개만 자동 설정이 가능합니다.\n\n---\n\n### 2.2 스킬\n\n#### 스킬 구분\n각 스킬별 등급이 존재하며, 크게 액티브 스킬과 패시브 스킬로 구분됩니다.\n\n- **액티브 스킬**: 스킬 습득 후 직접 사용해야 하는 스킬\n- **패시브 스킬**: 스킬 습득 시 항상 효과가 발동되며 유지되는 스킬\n\n#### 스킬 사용\n- 습득한 스킬은 단축 스킬 슬롯으로 이동 후 직접 사용할 수 있습니다.\n- AUTO 버튼을 활성화하거나 단축 슬롯에서 스킬을 자동 사용으로 전환해 사용할 수 있습니다.\n\n#### 스킬 순서 설정\n- 액티브 스킬 톱니바퀴 버튼을 통해 자동 전투 스킬 순서를 설정할 수 있습니다.\n\n#### 스킬 주기\n- 스킬 자동 사용 외에도 각 스킬별 사용 주기를 설정할 수 있으며, 자동 사용 순서도 별도 설정 가능합니다.\n\n#### 스킬 획득처\n본인 클래스에 맞는 스킬북을 획득한 후 가방에서 사용하면 스킬이 활성화됩니다.\n\n- 각 마을에서 골드를 이용하여 스킬 구매\n- 제작을 통해 획득\n- 보스 몬스터 처치 후 획득\n- 거래소를 통한 유저 간 거래\n- 퀘스트를 통해 획득\n\n---\n\n### 2.3 랭킹\n\n랭킹은 **일반 랭킹**과 **시즌 랭킹**으로 나누어지며, 일정 시간마다 갱신됩니다.\n\n#### 일반 랭킹\n\n레벨, 전투력, 클랜의 랭킹 정보를 확인할 수 있습니다.\n\n**랭킹 혜택 - 레벨 / 전투력**\n\n| 순위 | 설명 |\n|------|------|\n| 1 | PvP 피해 +25, PvP 피해 저항 +10, PvP 명중 +9 |\n| 2 | PvP 피해 +20, PvP 피해 저항 +8, PvP 명중 +6 |\n| 3 | PvP 피해 +15, PvP 피해 저항 +6, PvP 명중 +3 |\n| 4 ~ 10 | PvP 피해 +10, PvP 피해 저항 +4 |\n| 11 ~ 100 | PvP 피해 +5, PvP 피해 저항 +2 |\n\n**랭킹 혜택 - 클랜**\n\n| 순위 | 설명 |\n|------|------|\n| 1 | 보스 몬스터 피해 +60, 저항 +30, 명중 +15 |\n| 2 ~ 3 | 보스 몬스터 피해 +48, 저항 +24, 명중 +12 |\n| 4 ~ 10 | 보스 몬스터 피해 +36, 저항 +18, 명중 +9 |\n| 11 ~ 50 | 보스 몬스터 피해 +24, 저항 +12, 명중 +6 |\n\n#### 시즌 랭킹\n\n통합, 소환, 토벌, 암거래, 강화의 시즌 랭킹 정보를 확인할 수 있습니다.\n\n- 시즌 랭킹에 따라 작위가 부여되며, 작위 정보 메뉴에서 획득 가능합니다.\n- RP(랭킹 포인트)는 클랜 시스템에 포함됩니다.\n\n**랭킹 혜택 - 통합**\n\n| 순위 | 설명 |\n|------|------|\n| 1 | 공작 작위 획득, RP +400 |\n| 2 ~ 3 | 후작 작위 획득, RP +200 |\n| 4 ~ 6 | 백작 작위 획득, RP +100 |\n| 7 ~ 40 | 자작 작위 획득, RP +50 |\n| 41 ~ 100 | 남작 작위 획득, RP +25 |\n| 101 ~ 300 | RP +15 |\n| 301 ~ 500 | RP +10 |\n\n**랭킹 혜택 - 소환 / 토벌 / 암거래 / 강화 (공통)**\n\n| 순위 | 보상 |\n|------|------|\n| 1 | 트리니티 500개, 정복자 초상화 복원제 20개, 항목별 추가 보상 |\n| 2 ~ 3 | 트리니티 400개, 정복자 초상화 복원제 16개 |\n| 4 ~ 10 | 트리니티 300개, 정복자 초상화 복원제 12개 |\n| 11 ~ 20 | 트리니티 200개, 정복자 초상화 복원제 8개 |\n| 21 ~ 100 | 트리니티 100개, 정복자 초상화 복원제 4개 |\n\n※ 획득한 모든 보상은 '캐릭터 귀속'입니다.\n\n- 이전 시즌 기록: 상위 100위까지의 이전 랭킹 정보 및 대상자 확인 가능\n\n---\n\n## 3. 형상 / 탈것\n\n### 3.1 피의 형상\n\n피의 형상은 캐릭터의 외형을 변화시키며, 사냥과 전투에 도움이 되는 능력치와 스킬을 제공합니다.\n\n#### 등급\n\n| 등급 |\n|------|\n| 일반 / 고급 / 희귀 / 영웅 / 전설 / 신화 |\n\n#### 착용 조건\n- 직업별 전용 스킨이 존재하지만, 직업과 관계없이 착용 가능합니다.\n- 희귀 등급 이상부터 존재하는 형상 전용 스킬은, 직업과 동일한 형상을 착용해야만 사용 가능합니다.\n\n#### 합성\n- 중복 보유한 같은 등급의 피의 형상을 합성하여 새로운 형상이나 상위 등급의 형상을 획득할 수 있습니다.\n\n#### 도감\n도감은 **보유 효과**, **연결 효과**, **초월 효과**로 이루어져 있습니다.\n\n- **보유 효과**: 등급별 피의 형상 획득 완성도에 따라 발동되어 추가 능력치 획득\n- **연결 효과**: 획득한 피의 형상에 따라 연결 효과가 오픈되며, 필요 형상 획득 및 연결 시 능력치 향상\n- **초월 효과**: 동일한 전설 등급 형상 획득 시 활성화\n\n#### 확정 / 재소환\n- 영웅 등급 이상 획득 시 게임 내 재화를 이용하여 형상 교체 가능\n- 교체 횟수에 따라 재화 사용량이 증가합니다.\n\n#### 외형\n- 장착 형상과 별개로 보유 중인 형상 중 원하는 형상을 외형으로 변경 적용 가능\n- 외형 형상의 능력치는 추가 적용되지 않고 외형만 변경됩니다.\n- 일부 스페셜 외형은 능력치 추가 효과 획득 가능\n\n---\n\n### 3.2 탈것\n\n탈것은 뱀피르에서 지역을 이동할 때 사용하는 기본적인 이동 수단입니다.\n\n#### 등급\n| 등급 |\n|------|\n| 일반 / 고급 / 희귀 / 영웅 / 전설 / 신화 |\n\n#### 합성\n- 중복 보유한 동일 등급의 탈것을 합성하여 새로운 탈것이나 상위 등급의 탈것을 획득할 수 있습니다.\n\n#### 도감 (보유 효과 / 연결 효과 / 초월 효과)\n피의 형상과 동일한 구조로 도감이 구성되어 있습니다.\n\n#### 확정 / 재소환\n- 영웅 등급 이상 탈것 획득 시 게임 내 재화를 이용하여 탈것 교체 가능\n- 교체 횟수에 따라 재화 사용량이 증가합니다.\n\n#### 외형\n- 장착 탈것과 별개로 보유 중인 탈것 중 원하는 탈것을 외형으로 변경 적용 가능\n- 외형 탈것의 능력치는 적용되지 않고 외형만 변경됩니다.\n- UI 버튼을 클릭하여 UI를 ON/OFF 할 수 있습니다.\n\n---\n\n## 4. 성장\n\n### 4.1 컬렉션\n\n컬렉션을 수집하여 캐릭터 능력치를 보상으로 획득할 수 있습니다.\n\n- 각 컬렉션에는 능력치가 존재하며, 컬렉션 완성 시 해당 능력치가 캐릭터에 적용됩니다.\n- 컬렉션은 총 5개로 나누어져 있으며, 구분된 컬렉션별로 등록에 필요한 아이템이 상이합니다.\n- 검색과 다양한 필터를 통해 원하는 컬렉션 항목을 빠르게 찾을 수 있습니다.\n\n**주의사항**\n- 컬렉션에 아이템을 등록하면 가방에서 소멸됩니다.\n- 암거래에서 교환 가능한 품목일 경우 추가 주의 문구가 표시됩니다.\n\n---\n\n### 4.2 초상화\n\n- 초상화는 게임 내 프로필 사진이며, 활성화 단계에 따라 추가 능력치를 획득할 수 있습니다.\n- 다양한 종류와 등급으로 구성되어 있습니다.\n\n#### 초상화 복원\n- 초상화를 해금하기 위해서는 **초상화 복원제**가 필요합니다.\n- 초상화 복원제는 각종 던전, 퀘스트, 유료재화를 통해 획득 가능합니다.\n- 초상화 복원제를 통해 각 초상화의 10단계까지 해금 완료 시 복원 버튼이 활성화됩니다.\n- 복원 버튼을 누르면 복원이 완료되며 해당 초상화를 장착할 수 있습니다.\n\n#### 적용 효과\n- 적용 효과 버튼을 통해 현재 적용 중인 모든 초상화 능력치의 합을 확인할 수 있습니다.\n\n---\n\n### 4.3 아티팩트\n\n아티팩트 강화를 진행하여 캐릭터의 능력치를 획득할 수 있습니다.\n- **오픈 조건**: 에피소드 1 [메인 101. 도착한 미래] 퀘스트 완료 시 개방\n\n#### 아티팩트 강화\n- 아티팩트를 활성화한 후 **아티팩트 강화석**을 이용하여 강화를 진행할 수 있습니다.\n- 강화 성공 시 추가 능력치 획득\n- 강화 진행 시 성공 또는 실패할 수 있으며, 성공 시 1~3 레벨이 확률적으로 상승됩니다.\n\n#### 자동 강화\n- 목표로 설정한 레벨 단계까지 자동으로 강화를 진행합니다.\n- 목표 레벨 도달 또는 재화 부족 시 자동 강화가 종료됩니다.\n\n---\n\n### 4.4 규율 / 절대 규율\n\n#### 규율\n[트리니티]를 이용해 각인을 진행하여 영구적인 능력치를 획득할 수 있는 시스템입니다.\n\n- 캐릭터 레벨에 따라 상위 각인 단계가 오픈되며, 각 단계별 각인 효과가 상이합니다.\n- 각인 진행 시 확률에 따라 3개의 슬롯에 각인 효과와 능력치 수치가 반영됩니다.\n- 획득한 각인 효과는 잠금 기능으로 고정 가능하며, 잠금 개수에 따라 재료 및 재화 사용량이 증가합니다.\n- 모든 슬롯에 최대 능력치 획득 시 추가 효과가 보너스로 적용됩니다.\n\n**자동 각인**\n- 원하는 능력치를 얻을 때까지 자동 각인 진행\n- 원하는 능력치 획득 또는 재료 부족 시 자동 각인이 중단됩니다.\n\n#### 절대 규율\n- **오픈 조건**: 캐릭터 Lv 60 이후 오픈\n- 각인서를 소모해 각인을 진행할 수 있습니다. (각인서: 상점 교환 또는 영원의 주화 상인)\n- 각 슬롯별 등급이 존재하며, 확률에 따라 등급이 상승합니다.\n- 한번 상승한 등급은 하락하지 않으며, 재각인 시 현재 등급의 능력치 그룹을 기준으로 지급됩니다.\n\n**추가 효과 적용 예시**\n\n| 구분 | 슬롯 상태 | MAX 전체 달성 여부 | 추가 효과 등급 |\n|------|-----------|-------------------|----------------|\n| 활성화 조건 | [일반] MAX 미달성 슬롯 존재 | X | 효과 미적용 |\n| 활성화 조건 | 모든 슬롯이 [일반] | O | [일반] |\n| 슬롯 간 등급 불일치 | [고급]/[고급]/[희귀] | X | [고급] |\n| 슬롯 간 등급 불일치 | [고급]/[희귀]/[영웅] | O | [고급] |\n| 슬롯 간 등급 일치 | 모든 슬롯이 [희귀] | X | [고급] |\n| 슬롯 간 등급 일치 | 모든 슬롯이 [영웅] | X | [희귀] |\n| 슬롯 간 등급 일치 | 모든 슬롯이 [영웅] | O | [영웅] |\n\n---\n\n### 4.5 마력 연구\n\n#### 마력 주입\n- 활성화된 플라스크에 마력 구슬을 주입해 효과를 획득할 수 있습니다.\n\n#### 마력 구슬\n- 각 던전에서 획득하며, 마력 플라스크 주입 재료로 사용합니다.\n\n#### 주입 효과\n- 마력 구슬을 플라스크에 주입하면, 마력 연구를 통해 추가 효과를 획득할 수 있습니다.\n- 마력 연구 성공 시 다음 단계 플라스크가 개방되며, 새로운 마력 주입이 가능합니다.\n\n---\n\n### 4.6 아카이브\n\n서버 내에서 진행하는 공통/경쟁 업적 시스템입니다.\n\n#### 연대기\n- 서버 내 모든 유저가 함께 달성하는 업적\n- 완료 시 서버 내 모든 유저가 보상을 획득할 수 있습니다.\n\n#### 영웅전\n- 경쟁 업적으로 서버 최초 달성에 대한 캐릭터 정보 및 클랜 정보가 기록됩니다.\n- 업적 달성 시 달성자 또는 클랜의 정보가 기록되며, 서버에 있는 모든 캐릭터가 보상을 획득할 수 있습니다.\n- 갱신까지 다소 시간이 소요될 수 있습니다.\n\n---\n\n### 4.7 세피라\n\n- 세피라는 **생명의 나무**에 세피라를 각인하여 능력치를 획득하는 시스템입니다.\n\n#### 구분\n- 생명의 나무는 총 3개의 그룹으로 구분되며, 해당 그룹에 같은 모양의 세피라를 각인시킬 수 있습니다.\n\n| 구분 | 항목 |\n|------|------|\n| 외형 (3종) | 아칠루트 / 브리아 / 예치라 |\n| 등급 (6종) | 일반 / 고급 / 희귀 / 영웅 / 전설 / 신화 |\n| 문양 (4종) | 알파 / 시그마 / 세타 / 카파 |\n\n#### 세피라 합성\n- 각인하지 않은 세피라를 합성하여 새로운 세피라를 획득할 수 있습니다.\n\n#### 세피라 보너스 효과\n\n| 효과 | 설명 |\n|------|------|\n| 각인 효과 | 세피라 각인 시 세피라에 부여된 능력치가 적용됩니다. |\n| 연결 효과 | 각 그룹에 모든 세피라를 각인할 경우 연결 효과가 적용됩니다. |\n| 세트 효과 | 각 그룹에 각인된 세피라의 문양이 모두 동일할 경우 세트 효과가 발동됩니다. |\n\n---\n\n### 4.8 혈계 진화\n\n'진화석'을 사용하여 세포를 진화시키고, 추가 능력치를 획득할 수 있는 시스템입니다.\n\n#### 세부 내용\n1. 진화를 통해 각 세포를 진화시켜 세포의 효과를 획득할 수 있습니다.\n2. [혈계 진화] 버튼을 눌러 진화를 시도할 행을 선택할 수 있습니다.\n3. 행 마다 진화 가능 횟수가 존재하며, 진화 시 정해진 확률에 따라 하나의 세포가 성장합니다.\n4. 동일한 세포가 중복 선택된 경우 해당 세포의 레벨이 상승합니다.\n5. [진화] 버튼 수동 진화, [자동 진화] 버튼 자동 진화 가능\n6. 선택한 행의 초기화는 [초기화] 버튼으로 진행 (다이아 사용, 사용 재료는 반환되지 않음)\n\n#### 개별 효과\n- 진화를 통해 세포가 오픈된 경우 세포의 '개별 효과'를 획득할 수 있습니다.\n\n#### 완성 효과\n- 연결된 열의 모든 세포가 최소 'Lv.1'을 달성한 경우 '완성 효과' 획득\n- 동일한 열의 세포 레벨 중 가장 낮은 레벨을 기준으로 완성 효과 레벨이 적용됩니다.\n\n---\n\n## 5. 장비 강화 / 제작\n\n### 5.1 강화\n\n강화 주문서를 이용하여 무기와 장신구를 강화할 수 있습니다. 강화 시 장비의 능력치가 상승합니다.\n\n#### 강화 종류\n- **단일 강화**: 한 개의 장비를 강화합니다.\n- **다중 강화**: 동일한 종류의 장비를 여러 개 강화합니다.\n- **세공**: 장비에 추가 능력치를 부여합니다.\n- **축복**: 낮은 확률로 장비에 추가 능력치를 부여합니다.\n\n#### 강화 주문서 종류\n\n| 분류 | 설명 |\n|------|------|\n| 강화 주문서 | 강화 성공 시 강화 단계가 1 상승합니다. |\n| 축복받은 강화 주문서 | 강화 성공과 대성공이 존재하며, 구분에 따라 강화 단계가 1 또는 2 상승합니다. |\n| 저주받은 강화 주문서 | 사용 시 강화 단계가 1 하락합니다. |\n\n#### 강화 성공/실패 종류\n\n| 구분 | 설명 |\n|------|------|\n| 대성공 | 강화 단계가 2 추가되면서 능력치가 상승합니다. |\n| 성공 | 강화 단계가 1 추가되면서 능력치가 상승합니다. |\n| 성공(저주) | 저주 강화에 성공하여 강화 단계가 1 하락합니다. |\n| 파괴 | 강화에 실패하여 장비 아이템이 가방에서 제거됩니다. |\n| 보존 | 강화에는 실패했으나 장비 아이템에 아무런 변화가 없습니다. |\n\n#### 안전 강화 수치\n- 각 장비는 '안전 강화 수치'가 존재합니다.\n- 안전 강화 수치 이상 강화를 진행할 경우 장비 강화에 실패할 수 있습니다.\n- 강화 실패 시 장비가 파괴되는 페널티가 존재하며, 파괴된 장비는 복구할 수 없습니다.\n- 장비 종류에 따라 안전 강화 수치는 상이합니다.\n\n#### 단일 강화\n- 한 개의 장비를 한 단계씩 강화할 수 있으며, 빠른 강화 기능을 통해 안전 강화 구간까지 한 번에 강화할 수 있습니다.\n\n#### 다중 강화\n- 같은 종류의 장비를 지정한 단계까지 동시에 강화할 수 있습니다.\n\n#### 컬렉션 정보 & 암거래 정보\n- 컬렉션에 필요한 강화 수치와 암거래 교환 가능 여부를 체크박스를 통해 미리 확인할 수 있습니다.\n\n---\n\n### 5.2 세공\n\n'희귀' 등급 이상의 장비에 트리니티를 사용하여 추가 능력치를 무작위로 부여합니다.\n\n#### 세공 방법\n- 트리니티를 이용하여 진행하며, 장비 종류 및 등급에 따라 부여되는 능력치와 옵션 개수가 다릅니다.\n\n**등급에 따른 옵션 개수**\n\n| 장비 등급 | 옵션 개수 |\n|-----------|-----------|\n| 희귀 | 2 |\n| 영웅 | 3 |\n| 전설 | 3 |\n| 신화 | 5 |\n\n※ 부장품은 4개의 세공 옵션을 가지고 있습니다.\n\n#### 자동 세공\n- 원하는 능력치를 얻을 때까지 자동으로 세공할 수 있습니다.\n- 원하는 능력치 및 등급을 설정할 수 있습니다.\n- 원하는 옵션 획득 또는 세공 비용 부족 시 자동 세공이 중단됩니다.\n\n#### 세공 옵션 저장 / 불러오기\n- 원하는 옵션과 수치 획득 시 해당 세공 내역을 저장할 수 있습니다.\n- 저장된 세공 옵션은 동일한 장비에 한해서 언제든지 불러오기가 가능합니다.\n- 다른 세공 옵션을 저장할 경우 기존에 저장된 세공 옵션은 사라집니다.\n\n---\n\n### 5.3 축복\n\n희귀 등급 이상의 장비에 다량의 트리니티를 소비하여 추가 능력치를 부여할 수 있습니다.\n\n- **성공률**: 20%로 고정 (실패해도 장비가 파괴되지 않음)\n- **옵션**: 장비별 능력치 상승 정도가 상이하며, 축복 성공 시 아이템 이름에 축복 여부와 추가 능력치가 별도 표시됩니다.\n- **재료**: 다량의 트리니티 재화가 필요하며, 아이템 등급에 따라 재화 소모량이 상이합니다.\n\n---\n\n### 5.4 제작\n\n제작 재료를 소모하여 장비, 스킬북 등 필요한 아이템을 직접 제작할 수 있습니다.\n\n#### 재료 획득\n- 몬스터와의 전투, 퀘스트 등을 통해 다양한 재료를 획득할 수 있습니다.\n\n#### 제작 가능 아이템\n\n| 분류 | 항목 |\n|------|------|\n| 장비 | 무기 / 방어구 / 장신구 |\n| 재료 | 제작 재료 / 성장 재료 / 암거래 |\n| 스킬북 | 각 등급별 스킬북 |\n| 소모품 | 세피라 소환권 / 부장품 / 초상화 복원제 |\n| 인장 | 피의 인장 및 상위 등급 인장 |\n| 이벤트 | 이벤트 아이템 |\n| 컬렉션 | 컬렉션 등록 아이템 |\n\n#### 제작 구분\n\n| 구분 | 설명 |\n|------|------|\n| 성공 | 제작에 성공한 아이템을 획득합니다. 성공으로 제작한 아이템은 거래가 불가합니다. |\n| 대성공 | 거래 가능 아이템을 획득하며, 제작 아이템 구분에 따라 아이템을 추가로 획득할 수 있습니다. |\n| 실패 | 제작에 실패하여 재료가 소멸되며, 제작 실패에 따른 부산물을 획득할 수 있습니다. |\n\n#### 장인의 손길\n- 제작 실패가 일정 횟수 누적되면 '장인의 손길'이 발동됩니다.\n- 발동 시 다음 제작은 반드시 성공합니다.\n\n---\n\n## 6. 퀘스트\n\n### 6.1 퀘스트\n\n퀘스트는 **메인**, **서브**, **일일 퀘스트**로 나누어져 있습니다.\n\n#### 메인 퀘스트\n- 뱀피르의 메인 스토리를 확인할 수 있는 퀘스트이며, 다양한 이야기 및 보상으로 구성되어 있습니다.\n\n#### 서브 퀘스트\n- 메인 퀘스트의 진행도에 따라 오픈됩니다.\n- 서브 퀘스트를 진행함에 따라 NPC의 스토리를 확인할 수 있습니다.\n- 인물 도감에 존재하는 인물 정보와 에피소드 완성 보상이 활성화됩니다.\n\n#### 일일 퀘스트\n- 하루 최대 진행 가능한 횟수가 제한되어 있으나, 동시에 여러 퀘스트를 수락하고 진행할 수 있습니다.\n- 완료 시 경험치, 골드 등 다양한 보상을 획득할 수 있습니다.\n\n---\n\n### 6.2 인물도감\n\n퀘스트를 진행하며 만나게 되는 각 영지의 주요 인물 및 관계 정보를 확인할 수 있습니다.\n\n#### 도감 오픈\n- 각 영지의 첫 메인 퀘스트를 완료하면 해당 영지의 인물 도감이 오픈됩니다.\n\n#### 보상\n- 인물 도감 내 NPC가 제공하는 서브 퀘스트를 클리어하여 인물 정보를 모두 오픈할 경우 에피소드 완성 보상이 지급됩니다.\n\n#### 인물 관계도\n- 상호 관계가 있는 인물 도감이 오픈된 경우 화살표 말풍선을 눌러 두 인물 간의 관계를 확인할 수 있습니다.\n\n#### 에피소드 보상\n- 에피소드 보상을 일정 수준 수령할 경우 영지 단위의 에피소드 보상을 추가로 수령할 수 있습니다.\n\n---\n\n### 6.3 블러드라인\n\n#### 진행 방식\n1. 블러드라인은 던전 형태로 구성되어 있으며 **선지자 캐릭터**로 진행됩니다.\n2. 선지자 캐릭터는 기존 캐릭터의 능력치가 일부 반영됩니다.\n3. 각 던전에는 제한 시간이 존재하며, 제한 시간 내 공략에 실패할 경우 던전에서 퇴장합니다.\n4. 퇴장당한 던전에는 언제든지 다시 도전할 수 있으며, 이미 클리어된 던전에는 재입장이 불가합니다.\n5. 블러드라인 퀘스트 및 던전을 클리어할 경우 성장에 필요한 다양한 보상을 획득할 수 있습니다.\n\n---\n\n## 7. 업적\n\n업적은 총 다섯 가지 항목으로 구분되며, 항목별 업적 달성에 따라 다양한 보상을 획득할 수 있습니다.\n\n업적을 달성할 경우 누적된 업적 포인트로 추가 보상 획득이 가능합니다.\n\n| 구분 | 설명 |\n|------|------|\n| 레벨 | 레벨 달성 |\n| 성장 | 장비의 강화, 분해, 제작 시도 |\n| 재화 | 골드 소모, 형상/탈것, 세피라 획득 |\n| 모험 | 클랜 활동, 던전 이용, 퀘스트 진행 |\n| 전투 | 몬스터 처치, 스킬 사용 |\n\n---\n\n## 8. 주요 콘텐츠\n\n### 8.1 던전\n\n던전은 **일반 던전**과 **에픽 던전**으로 나누어져 있습니다.\n\n#### 일반 던전\n1. 매일 일정 시간의 기본 이용 시간이 주어지며, 던전 초기화 일정에 따라 갱신됩니다.\n2. 던전 이용 중 시간 충전석을 획득할 경우 충전석을 이용하여 던전 이용 시간을 충전할 수 있습니다.\n3. 던전마다 획득할 수 있는 보상이 나누어져 있으며, 레벨에 따라 더 높은 구역으로 이동하여 플레이할 수 있습니다.\n\n#### 에픽 던전\n1. 특정 보스가 존재하는 파티 전용 던전입니다.\n2. 주간 3회까지 무료로 입장할 수 있으며, 입장권을 이용하여 추가 입장이 가능합니다.\n   - 무료 입장은 모든 에픽 던전에서 공용으로 사용됩니다.\n3. 파티를 생성하여 인원을 구성하거나 자동 매칭을 통해 입장 가능합니다.\n4. 제한 시간 내 던전을 클리어하여 보상을 획득할 수 있습니다.\n5. 입장하는 에픽 던전의 보스 정보를 미리 확인할 수 있습니다.\n\n---\n\n### 8.2 월드 보스\n\n- 원하는 월드 보스 몬스터를 선택하여 스폰 시간, 참여 보상, 기여도 보상을 확인할 수 있습니다.\n- 월드 보스 처치 시 지급되는 보상은 **참여 보상**과 **기여도 보상**으로 나누어집니다.\n- 월드 보스 몬스터 처치 후 별도의 보스 보상 아이콘이 노출되며, 해당 아이콘 터치 시 처치 내역 및 보상 정보를 확인할 수 있습니다.\n\n---\n\n### 8.3 게헨나\n\n게헨나는 PvP 격전지로 각 구역별로 나누어져 있으며, 필드에 출현하는 몬스터 및 보스의 레벨과 종류가 다양합니다.\n\n1. 게헨나 입장권을 사용하여 격전지로 이동이 가능합니다.\n2. 최대 입장 가능 인원은 **200명**으로 제한됩니다.\n3. 몬스터 처치 시 경험치와 아이템 등 다양한 보상을 획득할 수 있으며, 구역마다 획득할 수 있는 보상은 상이합니다.\n4. 게헨나 입장 시 각 지역별 몬스터 및 보스 정보를 확인할 수 있습니다.\n5. 게헨나 구역에서 몬스터 처치 시 **게헨나 포인트**라는 별도의 재화를 획득할 수 있으며, 마을의 게헨나 포인트 상인에게 다양한 아이템을 구매할 수 있습니다.\n\n---\n\n### 8.4 쟁탈전\n\n[쟁탈전]은 매칭된 서버 그룹 내에서 최강의 클랜을 가리는 PvP 전장입니다.\n\n#### 쟁탈전 진행 순서\n1. 쟁탈전은 각 서버 전투력 상위 3개 클랜이 진출하며, **전초전**을 통해 서버별 1위 클랜을 가립니다.\n2. 선발된 각 서버 1위 클랜은 **결승전**에서 맞붙어 최종 우승 클랜을 결정합니다.\n\n#### 참여 클랜 및 승리 조건\n\n| 라운드 | 참여 클랜 | 진출/우승 조건 |\n|--------|-----------|----------------|\n| 전초전 | 각 서버의 전투력 총합 1~3위 클랜 | 가장 많은 점수를 획득한 1개 클랜 |\n| 결승전 | 전초전에서 1위를 달성한 클랜 | 먼저 10,000점을 달성하거나, 라운드 종료 시 더 많은 점수를 획득한 1개 클랜 |\n\n- 전초전은 라운드 종료 시간(30분) 도달 또는 빅토리아 처치 시 즉시 종료됩니다.\n- 결승전은 라운드 종료 시간(30분) 도달 또는 한 클랜이 먼저 10,000점 달성 시 즉시 종료됩니다.\n- 클랜에 가입한 지 24시간이 지나지 않은 캐릭터는 전장에 입장할 수 없습니다.\n\n#### 승자의 특권\n\n| 라운드 | 순위 | 특권 |\n|--------|------|------|\n| 전초전 | 1위 클랜 | 승자의 선언(서버 공지), 월드 보스 출현 시간 결정 |\n| 결승전 | 1위 클랜 | 채팅 금지령, 게헨나 보스 출현 시간 결정, 게헨나 2구역 입장 위치 결정 |\n\n#### 쟁탈전 정규 시즌 우승 클랜 특별 보상\n1. **선지자의 무기 [영웅 등급]**: 쟁탈전 보상으로만 획득 가능한 장비 아이템. 클랜 금고로 '선지자의 영웅 무기 상자'로 지급됩니다.\n2. **위대한 선지자의 무기 [전설 등급]**: 선지자의 무기를 일정 수치까지 강화하여 전설 등급 무기의 제작 재료로 사용 가능. 장착 시 무기에 부여된 특별한 스킬을 사용할 수 있습니다.\n\n#### 결승전 상금 구조\n- 총 상금: 5,000,000 다이아\n- 1위 클랜: 총 상금의 60% (우승 상금)\n- 기여도 보상: 총 상금의 40%를 결승전 점수 획득량에 비례하여 양 클랜에 분배\n\n---\n\n### 8.5 정예 던전\n\n- 정예 던전은 무작위로 매칭된 **6개의 서버**가 제한된 사냥터 스팟을 두고 경쟁하는 인터 서버 콘텐츠입니다.\n- 매주 주어진 시간을 전략적으로 활용하여 전용 버프와 주요 스팟을 선점하거나 파티를 구성해 쟁탈하는 등 다양한 전략을 펼칠 수 있습니다.\n\n#### 광휘의 요람\n- 정예 던전 진입 시 전용 디버프 **[광휘의 저주]**가 적용됩니다.\n- 각 사냥터 진입 시 전용 디버프가 적용되며, 사냥터의 난이도에 따라 기본 디버프 단계(최대 7단계)가 상승합니다.\n\n#### 저항력\n- 특정 아이템을 통해 저항력을 올려 디버프 단계 및 효과를 완화할 수 있습니다.\n- 밤의 가호 물약 사용 시 10분 동안 저항력 1 획득\n- 정예 던전 내에서 획득 가능한 인장으로 저항력을 최대 8까지 획득 가능\n\n#### 버프 오브젝트 (살육의 제단)\n- 각 사냥터 중앙에 위치한 '살육의 제단'과 상호 작용하여 전용 버프 **'살육의 권능'**을 획득할 수 있습니다.\n- **살육의 권능 버프 효과**:\n  - 모든 피해량 [7%] 증폭\n  - 공격 속도 [15%] 증가\n  - 지속 시간: 10분\n- 해당 버프는 사냥터 내 1인만 보유할 수 있으며, 월드맵에 버프 보유자의 위치가 노출됩니다.\n- PK를 통해 버프 보유자의 버프를 강탈할 수 있으며, 지속 시간은 최대치로 초기화됩니다.\n\n#### 서버 매칭\n- 서버 매칭은 서버 그룹 셔플링과 동일한 주기로 진행됩니다.\n- 매주 3시간의 기본 입장 시간이 제공되며, 충전석을 사용하여 추가 입장 가능합니다.\n\n---\n\n## 9. 거래소\n\n거래소를 통해 자유롭게 다른 유저들과 아이템을 거래할 수 있습니다.\n> **거래소 이용을 위해서는 [본인 인증]이 필요합니다.**\n\n#### 구매\n- 유료 재화인 **'다이아'**를 이용하여 다른 유저가 등록한 아이템을 구매할 수 있습니다.\n\n#### 판매\n- 캐릭터가 보유한 거래 가능한 아이템을 거래소에 등록하여 판매할 수 있습니다.\n- 판매 등록 시 일정 등록 시간이 지난 후 등록이 완료됩니다.\n\n#### 거래 수수료\n\n| 구분 | 설명 |\n|------|------|\n| 등록 | 등록 금액의 일정 %에 대한 골드 수수료 발생 |\n| 판매 | 판매 금액의 일정 %에 대한 다이아 수수료 발생 |\n\n#### 개인 거래\n- 특정 플레이어를 지정 후 아이템을 판매할 수 있습니다.\n- 장비: 희귀 등급 / 상자: 유일 등급 / 스킬북: 희귀 등급 / 기타: 희귀 등급 이상 거래 가능\n- 판매 등록 시 등록 수수료와 판매 보증금이 차감되며, 미판매 시 판매 보증금을 회수할 수 있습니다.\n- **'올가의 은총'** 구매 시 이용 가능합니다.\n\n#### 클랜 거래\n- 클랜에서 등록한 아이템을 구매할 수 있습니다.\n\n#### 거래 내역\n- 최근 거래된 200건의 내역이 14일간 노출됩니다.\n\n---\n\n## 10. 암거래\n\n암거래는 암상인이 필요로 하는 교환품을 제출하고, 그에 맞는 **[암흑 상단 주화]**를 획득할 수 있는 시스템입니다.\n\n#### 교환\n1. 각 교환품으로 획득할 수 있는 주화 개수는 상이하며, 교환품마다 교환 횟수가 정해져 있습니다.\n2. 암거래는 화면 하단 '목록 갱신 시간'과 '운영 종료 시간'에 따라 교환 가능 품목이 교체되거나 교환이 종료될 수 있습니다.\n3. 각 교환품을 선택하여 획득처, 제작, 거래소를 확인할 수 있습니다.\n\n---\n\n## 11. 클랜\n\n### 11.1 클랜\n\n#### 클랜 창설\n- 클랜 창설을 위해서는 일정량의 비용이 필요합니다.\n- 클랜을 탈퇴하거나 해산할 경우 5분 간 클랜 가입 및 창설이 제한됩니다.\n\n#### 클랜 레벨 혜택\n- 클랜 레벨은 기부를 통해 경험치를 획득하여 상승시킬 수 있습니다.\n\n| 클랜 레벨 혜택 |\n|----------------|\n| 가입 인원 증가 |\n| 콘텐츠 오픈 및 확대 |\n| 직위 설정 확대 |\n| 아이템 판매 등록 수 증가 |\n\n#### 클랜 직위\n\n| 직위 |\n|------|\n| 마스터 / 부마스터 / 리더 / 정예 / 일반 / 수습 |\n\n- 각 직위별로 설정할 수 있는 권한이 정해져 있으며, 각 직위별 권한은 클랜 마스터만 설정 가능합니다.\n\n#### 묘실\n- 묘실에 배치된 클랜 구성원의 RP(랭킹 포인트)에 따라 추가 능력치를 부여하는 시스템입니다.\n- RP 단계 적용 효과의 경우 단계 확장을 통해 더 많은 능력치를 획득할 수 있습니다.\n- 클랜 마스터는 각 묘실에 클랜원을 선택하여 배치하거나 변경할 수 있습니다.\n- RP(랭킹 포인트)는 시즌 랭킹으로 획득 가능합니다.\n\n#### 외교\n- 서버 내 다른 클랜을 적대 클랜으로 선포할 수 있습니다.\n- 적대 클랜 선포 시 양쪽 클랜에 시스템 메시지가 출력됩니다.\n- 적대 선포된 클랜의 유저는 미니맵에 전용 아이콘으로 위치가 표시됩니다.\n- 상호 적대 상태에서는 PK 발생 시 PK 수치 및 페널티가 적용되지 않습니다.\n- 한쪽이라도 적대 등록을 하지 않을 경우 PK 발생에 따른 수치 변동 및 페널티가 적용됩니다.\n\n#### 금고\n- 금고에는 클랜 활동으로 획득한 아이템이 보관됩니다.\n- 아이템에 대한 판매 및 다이아 분배 등을 관리할 수 있습니다.\n- 분배 대상 버튼 클릭 시 해당 아이템 획득에 참여한 클랜원 정보가 노출됩니다.\n- 보관함에 보유한 아이템을 거래소에 판매 등록할 수 있습니다. (클랜 거래, 일반 거래 등록 가능)\n\n---\n\n### 11.2 클랜 임무\n\n클랜 임무는 클랜원들과 협력하여 진행하는 클랜 전용 콘텐츠입니다.\n\n#### 기본 정보\n- 클랜 임무는 클랜 **3레벨 이상**부터 진행할 수 있습니다.\n- 주 1회 참여 가능하며, 입장 가능 횟수는 매주 월요일 05:00에 초기화됩니다.\n- 최대 **50명**까지 참여할 수 있으며, 수습 등급 클랜원은 참여할 수 없습니다.\n\n#### 임무 진행 순서\n1. 임무 수락 권한을 가진 인원이 임무를 수락합니다.\n2. 임무 수락 시 해당 캐릭터를 공격대장으로 임무 전용 공격대가 생성되며, 클랜 임무 지역으로 즉시 이동됩니다.\n3. 대기 시간 이후 임무 시작 버튼이 활성화됩니다.\n4. 임무 시작 후 보스가 등장하며, 타임어택 형식으로 진행됩니다.\n\n#### 주의사항\n- 클랜 임무에서는 탈것 탑승이 불가합니다.\n- 클랜 임무 내부에서는 순간이동 주문서 사용이 불가합니다.\n- 클랜 임무에서 퇴장해도 임무가 진행되는 동안 재입장이 가능하지만, 재입장하지 않으면 개인 보상을 받을 수 없습니다.\n\n#### 임무 종료 및 보상\n- 달성한 단계에 따라 보상이 차등 지급됩니다.\n- 보상은 **클랜 보상**과 **개인 보상**으로 구분되어 지급됩니다.\n- 지난 클랜 임무 기록은 [메인화면] → [클랜] → [임무]에서 최대 10개까지 확인할 수 있습니다.\n\n---\n\n## 12. 침공 (영역 침공)\n\n- 영역 침공은 제한된 시간 동안 특정 사냥터에 다른 차원의 몬스터가 대량으로 출현하는 이벤트 콘텐츠입니다.\n- 침공 몬스터를 처치하면 더 많은 경험치와 골드를 획득할 수 있으며, 이벤트 주화를 교환하여 다양한 보상을 받을 수 있습니다.\n\n#### 침공 발생 지역 및 시간\n- 포에나리 영지 '꿰뚫린 평원'부터 키셀 영지 '베즈단 - 고난의 언덕'까지 발생됩니다.\n- 이벤트 기간 동안 매일 **11시 / 15시 / 19시 / 23시**에 각 필드별 2~4개의 사냥터에서 동시에 침공이 발생됩니다.\n\n#### 침공 진행 과정\n1. 침공 발생 시 월드맵 좌측의 침공 아이콘을 선택해 침공이 진행되는 사냥터를 확인할 수 있습니다.\n2. 지도(M)를 선택 후 침공 아이콘에서 지역별 침공 진행 여부를 확인할 수 있습니다.\n3. 침공 발생 안내 후 30초의 대기시간이 지나면 침공 웨이브가 시작됩니다.\n4. 침공 시작 후 1분마다 웨이브 단계가 상승하며, 각 웨이브 단계별로 새로운 몬스터가 등장합니다.\n5. 몬스터를 모두 처치하거나 제한 시간 만료 시 '침공'이 종료됩니다.\n6. 제한 시간 내(5분)에 몬스터를 처치하지 못할 경우 그대로 소멸합니다.\n\n---\n\n## 13. 피의 관문\n\n피의 관문을 활성화하는 것으로 내 영역을 넓힐 수 있습니다.\n\n- 비활성화된 피의 관문은 회색빛을 띕니다.\n- 활성화된 피의 관문은 피로 가득 차 붉은 빛을 발합니다.\n- 피의 관문이 활성화되면 월드맵에서 가려졌던 영역 일부가 걷히며, 피의 관문 및 사냥터 스팟으로 순간 이동을 이용할 수 있게 됩니다.\n\n#### 피의 관문 활성화\n- 월드맵에서 피의 관문을 표시합니다. 활성화된 피의 관문은 흰색으로 표시됩니다.\n- 피의 관문 활성화 시 관문과 연결된 주변 사냥터 스팟도 활성화됩니다.\n\n#### 피의 관문 정보\n- 사냥터 정보에서 사냥으로 획득 가능한 전리품을 확인할 수 있습니다.\n- 사냥터 스팟 위치로 도보 이동하거나 비용을 지불해 순간 이동할 수 있습니다.\n\n---\n\n## 14. 미니맵\n\n- 미니맵은 게임 좌측 상단에 위치해 있으며, 캐릭터의 현재 위치를 확인할 수 있습니다.\n\n#### 기능\n1. 카메라 회전을 북쪽으로 정렬합니다.\n2. 마을 귀환 버튼을 누르면 마을로 이동할 수 있습니다.\n3. +/- 버튼을 눌러 미니맵을 확대 또는 축소할 수 있습니다.\n\n---\n\n## 15. 월드맵\n\n#### 주요 기능\n1. 지역 목록 버튼을 눌러 지역 목록 선택창을 열 수 있습니다.\n2. 영지별 지역 정보를 확인할 수 있습니다.\n3. 별 모양 아이콘을 눌러 해당 지역을 즐겨찾기 목록에 추가해 관리할 수 있습니다.\n4. 사냥터에 대한 정보를 확인할 수 있으며, 직접 이동하거나 비용을 지불해 순간 이동할 수 있습니다.\n5. 월드맵의 각종 아이콘 정보를 켜고 끌 수 있습니다.\n6. 현재 위치를 저장해 빠른 이동에 이용할 수 있습니다.\n7. 사망 시 위치 확인 대상을 저장하여 위치를 추적할 수 있습니다.\n8. 수행 중인 퀘스트 목록이 표시되며, 자동 이동 버튼을 통해 퀘스트를 진행할 수 있습니다.\n\n---\n\n## 16. 클래스 변경\n\n#### 클래스 변경 방법\n1. 변경할 클래스를 선택합니다.\n2. 전환할 형상을 선택합니다. (형상은 1개만 전환 가능, 선택한 형상에 따라 추가 비용 발생 가능)\n3. 전환할 장비를 선택합니다. (무기는 최대 3개까지 전환 가능, 선택한 무기에 따라 추가 비용 발생 가능)\n4. 전환할 스킬을 선택합니다. (보유한 모든 스킬 선택 가능, 선택한 스킬에 따라 추가 비용 발생 가능)\n5. 클래스 변경을 진행합니다.\n\n> **※ 클래스 변경은 마을에서만 가능합니다.**\n\n---\n\n## 17. NPC 상점\n\n#### 상점 바로가기\n- 마을 진입 시 우측 하단에 상점 바로가기 버튼이 활성화됩니다.\n- 해당 버튼을 눌러 각 상인에게 이동할 수 있습니다.\n\n#### 상점 내용\n- 각 상점마다 다양한 아이템을 판매합니다.\n- 판매 목록에서 원하는 아이템을 선택해 구매할 수 있습니다.\n- 가방에 보유한 판매 가능 아이템을 선택해 판매할 수 있습니다.\n\n#### 일괄 구매\n- 일괄 구매 설정 버튼을 눌러 일괄 구매 목록을 설정할 수 있습니다.\n- 일괄 구매 설정된 아이템은 일괄 구매 버튼을 눌러 한 번에 구매할 수 있습니다.\n\n---\n\n## 18. 흡혈\n\n몬스터를 공격하다 보면 **흡혈 아이콘**이 표시되는 경우가 있습니다.\n\n1. 흡혈 아이콘을 누르면 흡혈 스킬을 사용해 대상을 즉사시키며 흡혈 효과를 얻습니다.\n2. 흡혈 스킬은 몬스터와 캐릭터 각각 따로 준비되어 있습니다.\n3. 흡혈을 하면 흡혈 효과 외에 **아드레날린 게이지**도 충전됩니다.\n4. 아드레날린 게이지가 충전된 상태에서 캐릭터는 아드레날린 효과를 얻을 수 있습니다.\n\n---\n\n## 19. 영묘\n\n- 영묘는 묘지기와 계약을 맺고 파견을 보낸 후, 묘지기를 통해 **관 카드** 및 아이템을 획득하고, 획득한 관 카드를 장착하여 능력치를 획득할 수 있는 콘텐츠입니다.\n\n#### 묘지기\n- 묘지기 파견 시 '묘지기 파견 증서'를 지불하고 묘지기와 계약한 후 파견을 요청하여 '관'을 획득할 수 있습니다.\n\n#### 관\n- 관을 개방하여 관 카드를 획득한 후 관 카드를 영묘에 안치하거나, 중복 획득한 관 카드는 컬렉션 성장에 사용하여 능력치를 강화할 수 있습니다.\n- 관 열쇠 보유 시 관 열기 버튼이 활성화됩니다.\n- 승급 시도 시 총 4번의 기회가 주어지며, 정해진 확률에 따라 승급 시 관의 등급이 1단계 상승합니다.\n\n#### 안치\n- 획득한 관 카드를 안치하면 안치 효과를 획득합니다.\n- 관 카드의 소속 영묘와 동일한 영묘에 안치 시, 전용 효과 및 스킬을 획득할 수 있습니다.\n\n#### 보유 효과\n- 관 카드의 등급 및 획득 수량 조건에 따라 추가 능력치(보유 효과)를 획득할 수 있습니다.\n\n#### 컬렉션\n- 중복 획득한 관 카드를 사용하여 컬렉션의 카드 레벨을 성장시키고, 조건 만족 시 추가 능력치(컬렉션 능력치)를 획득합니다.\n\n---\n\n## 20. 나리찬예 계곡\n\n나리찬예 계곡은 **'일반 도전'**과 **'시즌 도전'**으로 구성된 1인 PvE 인스턴스 챌린지 콘텐츠입니다.\n\n- **이용 조건**: 캐릭터 Lv. 46부터 이용 가능\n- 나리찬예 계곡은 총 **50단계**로 구성되어 있습니다.\n- [메뉴] → [나리찬예 계곡] 탭을 통해 진입할 수 있습니다.\n\n#### 던전 상세 내용\n- 던전 입장 시 HP 및 MP가 모두 회복된 상태로 전투가 진행됩니다.\n- 던전 퇴장 시 입장 전 HP 및 MP 수치로 복구됩니다.\n- 다음 단계 자동 이동 기능을 활성화한 경우, 도전 성공 시 다음 단계에 자동 도전합니다.\n- 나리찬예 계곡 던전에서 사망하더라도 경험치가 손실되지 않습니다.\n- 나리찬예 계곡에서는 시즌 랭킹 액티브 스킬을 사용할 수 없습니다.\n\n#### 일반 도전\n- 도전은 1단계부터 시작되며, 현재 단계를 클리어해야만 다음 단계에 도전할 수 있습니다.\n- 각 단계에 입장하면 카운트다운 후 전투가 시작되며, 단계별 출현하는 몬스터 구성이 상이합니다.\n- 제한 시간 내에 몬스터 웨이브 및 보스를 모두 처치하면 도전에 성공합니다.\n- 도전 성공 시 단계별 보상을 획득할 수 있으며, 이미 완료한 단계에는 재도전할 수 없습니다.\n- 캐릭터 사망 또는 던전 제한 시간 초과 시 공략에 실패하며, 즉시 재도전하거나 던전에서 퇴장할 수 있습니다.\n\n#### 시즌 도전\n> ▶ 시즌 도전은 추후 업데이트를 통해 오픈될 예정입니다.\n\n---\n\n## 21. 기타\n\n### 21.1 서포트 모드\n\n> **서포트 모드는 에피소드 2 [메인 퀘스트 1. 빛의 기억] 완료 시 오픈됩니다.**\n\n#### 실행\n- 진행 순서를 변경하거나 진행 단계를 체크하여 원하는 콘텐츠만 선택하여 진행할 수 있습니다.\n\n#### 옵션: 진행 및 획득\n- 사망으로 인한 서포트 모드 중단 설정 및 무게 제한에 대한 설정이 가능합니다.\n\n#### 옵션: 자동 정비\n- 서포트 모드 이용 중 설정한 조건에 해당될 경우 근처 마을로 귀환하여 자동으로 정비를 진행하는 시스템입니다.\n- 자동 정비 완료 후 설정한 콘텐츠로 복귀하여 자동 사냥을 재개합니다.\n- **'올가의 은총'**을 보유하고 있을 경우 자동 정비를 활성화할 수 있습니다.\n\n| 정비 구분 | 설명 |\n|-----------|------|\n| 아이템 분해 | 가방 내 일괄 분해에 설정된 값에 따라 자동 분해됩니다. |\n| 아이템 보관 | 창고에 보관되어 있는 동일한 아이템이 보관됩니다. |\n| 아이템 구매 | 잡화 상인에게 설정된 구매 설정에 따라 구매합니다. |\n\n---\n\n### 21.2 옵션\n\n옵션 설정은 크게 다섯 가지로 구분됩니다.\n\n| 구분 | 설명 |\n|------|------|\n| 전투 | 자동 전투나 물약 사용 등의 옵션을 조정할 수 있습니다. |\n| 편의 | 게임 조작 연출 등을 조정할 수 있습니다. |\n| 환경 | 그래픽과 사운드 조정이 가능합니다. |\n| 알림 | 게임 내 다양한 알림 설정이 가능합니다. |\n| 계정/이용약관 | 계정 정보 확인이 가능하며, 고객 지원과 연결되어 있습니다. |\n\n---\n\n### 21.3 키셋팅\n\n- 키셋팅은 **넷마블 런처를 이용한 PC에서 사용이 가능한 기능**입니다.\n\n#### 전투 화면\n- 전투 화면에서 보이는 단축키를 변경할 수 있습니다.\n\n#### 단축키 목록\n- 단축키 목록에서 원하는 분류를 선택하여 설정을 변경할 수 있습니다.\n- 이미 입력되어 있는 키는 제거 및 변경 후 사용이 가능합니다.\n\n1. 게임에서 제공하는 기본적인 키셋팅 외에 본인의 플레이 스타일에 맞게 일부 조정이 가능합니다.\n2. 단축키 설정은 전투 화면과 단축키 목록에서 변경할 수 있습니다.\n3. 변경할 키를 선택한 후 원하는 키를 입력하면 키셋팅이 변경됩니다.\n\n---\n\n*본 문서는 넷마블 공식 가이드(https://guide.netmarble.com/thered)의 내용을 바탕으로 정리되었습니다.*\n*가이드 내용 및 이미지는 테스트 버전을 기준으로 작성되었으며, 실제 게임 화면의 구성과 다르거나 변경될 수 있습니다.*\n"},{"id":"updates","title":"업데이트 상세 이력","kind":"업데이트","source":"vampir_update_history.md","content":"# 뱀피르(VAMPIR) 업데이트 상세 이력\n\n> **용도**: AI 에이전트 참조용 — 시스템·콘텐츠 단위로 구조화된 업데이트 기록  \n> **출시일**: 2025-08-26  \n> **정보 출처**: 넷마블 공식 보도자료, 인벤, 게임메카(국민트리), 게임뷰, 베타뉴스, 공식 개선현황판  \n> **마지막 갱신**: 2026-04-30 기준\n\n---\n\n## 목차\n\n| # | 날짜 | 명칭 | 핵심 분류 |\n|---|------|------|-----------|\n| 0 | 2025-08-26 | 정식 출시 | 출시 |\n| 1 | 2025-09-03 | 1차 업데이트 | 밸런스 / 콘텐츠 |\n| 2 | 2025-09-10 | 2차 업데이트 | 밸런스 / 콘텐츠 |\n| 3 | 2025-09-27~28 | 쟁탈전 프리시즌 | 신규 콘텐츠(PvP) |\n| 4 | 2025-10-01 | 3차 업데이트 | 밸런스 / 보상 |\n| 5 | 2025-10-05 | 혈계 진화 추가 | 신규 성장 시스템 |\n| 6 | 2025-10-17~19 | 쟁탈전 1차 정규시즌 | 콘텐츠 운영 |\n| 7 | 2025-11-05 | 4차 업데이트 | 성장 / 콘텐츠 |\n| 8 | 2025-12-03 | 5차 업데이트 (100일) | 대규모 — 영지·클래스 |\n| 9 | 2025-12-17 | 6차 업데이트 | 게헨나 3구역 / 이벤트 |\n| 10 | 2026-01-08 | 7차 업데이트 | 편의 / PK |\n| 11 | 2026-01-21 | 8차 업데이트 | 대규모 — 인터서버 콘텐츠 |\n| 12 | 2026-02-04 | 9차 업데이트 | 서버 이전 / PK |\n| 13 | 2026-02-11 | 복구권 지급 (0.5주년) | 이벤트 |\n| 14 | 2026-03-11 | 10차 업데이트 | 대규모 — 신규 클래스 / 글로벌 |\n| 15 | 2026-03-18 | 11차 업데이트 | 밸런스 |\n| 16 | 2026-04-08 | 12차 업데이트 | 대규모 — 신규 콘텐츠 |\n| 17 | 2026-04-22 | 13차 업데이트 | 성장 시스템 / 이벤트 |\n\n---\n\n## UPDATE-00 | 2025-08-26 | 정식 출시\n\n### 기본 정보\n- **유형**: 정식 출시\n- **플랫폼**: 모바일(iOS/Android) + PC(넷마블 런처) 동시 출시\n\n### 출시 콘텐츠 전체 구성\n\n#### 클래스 (4종)\n| 클래스 | 무기 | 키워드 |\n|--------|------|--------|\n| 바이퍼 | 오브 | 마법, 저주, 원거리 |\n| 그림리퍼 | 낫 | 근접, 암살 |\n| 블러드스테인 | 검 | 근접, 방어 |\n| 카니지 | 총 | 원거리, 속공 |\n\n#### 성장 시스템 (출시 시점)\n- **장비 강화**: 단일/다중 강화, 안전 강화 수치 시스템\n- **세공**: 희귀 이상 장비에 트리니티 소모 → 추가 옵션 부여\n- **제작**: 장비·스킬북·재료 제작\n- **컬렉션**: 장비/유물/수집품 등록 → 능력치 획득\n- **초상화**: 복원제 소모 10단계 해금 → 능력치 획득\n- **아티팩트**: 강화석 소모 강화 (에피소드1 완료 후 해금)\n- **규율**: 트리니티 소모 3슬롯 각인 → 영구 능력치\n- **세피라**: 생명의 나무 각인 (외형 3종·등급 6종·문양 4종)\n- **피의 형상/탈것**: 일반~신화 6등급, 합성·도감·외형 시스템\n\n#### 주요 콘텐츠 (출시 시점)\n- **일반 던전**: 매일 기본 이용 시간 제공, 빛바랜 유산 던전 포함\n- **에픽 던전**: 파티/자동매칭, 주 3회 무료\n- **월드 보스**: 스폰 시간 기반 공개 사냥\n- **게헨나 1구역**: PvP 격전지, 최대 200인 입장\n- **클랜 시스템**: 창설·레벨·묘실·외교·금고\n- **거래소**: 다이아 기반 유저 간 거래 (본인 인증 필수)\n- **암거래**: 암흑 상단 주화 기반 아이템 교환\n- **블러드라인**: 선지자 캐릭터 던전 퀘스트\n- **퀘스트**: 메인/서브/일일 퀘스트\n\n#### 서버 시스템\n- **일반 서버**: 기본 플레이 서버\n- **서버 셔플링**: 일정 주기로 쟁탈전·게헨나 매칭 서버 재편성\n\n#### 성과 기록\n- 출시 8시간 → 앱스토어 매출 1위\n- 출시 7일 → 동시접속자 20만 명 돌파\n- 출시 9일 → 양대 마켓 매출 1위 동시 달성\n\n---\n\n## UPDATE-01 | 2025-09-03 | 1차 업데이트\n\n### 기본 정보\n- **유형**: 밸런스 개선 + 콘텐츠 추가\n- **배경**: 출시 후 약 1주일, 유저 피드백 긴급 반영\n\n### 밸런스 변경\n\n#### 골드 수급 개선\n- 일일 퀘스트 골드 보상 **2배 상향**\n- 빛바랜 유산 던전 골드 획득량 **2배 상향**\n\n#### 명중/회피 시스템 개편\n- 명중률 스탯 밸런스 **전반적 상향 조정**\n- 필드·던전·월드 보스·게헨나 전 구역 몬스터 회피율 **하향 재조정**\n  - 목적: 명중 스탯 확보 허들 완화, 다양한 스탯 활용 전투 경험 제공\n\n### 콘텐츠 추가\n\n#### 컬렉션 확장\n- 신규 컬렉션 항목 추가:\n  - 장비 **32종**\n  - 유물 **12종**\n  - 수집품 **16종**\n\n### 시스템 개선\n- **개선 현황판 신설**: 유저 건의사항 반영 상태를 공개 추적하는 시스템\n\n### 안정성\n- 서버 불안정 현상 개선\n\n### 이벤트\n| 이벤트명 | 기간 | 주요 보상 |\n|----------|------|-----------|\n| 매일 매일 성장하는 계승자! (출석) | ~9/17 | 탈것 11회 소환권 II |\n| 황금 미션 이벤트 | ~10/1 | 총 400만 골드 |\n| 몬스터 처치 이벤트 | ~10/1 | 다양한 보상 |\n\n### 개발자 노트\n> 한기현 PD: \"유저들의 목소리에 귀 기울이며 함께 호흡하겠다. 뱀피르에 대한 유저들의 소중한 의견은 더 나은 게임을 만드는 가장 중요한 밑거름이다.\"\n\n---\n\n## UPDATE-02 | 2025-09-10 | 2차 업데이트\n\n### 기본 정보\n- **유형**: 클래스 밸런스 + 클랜 콘텐츠 추가\n\n### 클래스 밸런스 조정\n\n#### 바이퍼 (대폭 상향)\n- 독 폭발·죽음의 혼·고통 폭발 등 대부분 스킬 피해량 계수 **+25%~+80%p** 상향\n- 고통의 속삭임: 기존 '피격자 4초간 PvP 방어력 20 감소' 삭제 → 새 효과: '피격자 7초간 마법 피해량 내성 10% 감소' 추가\n\n#### 그림리퍼\n- 전반적 피해량 소폭 상향\n- 어둠의 구속: '피격자 7초간 PvP 피해량 내성 10% 감소' 효과 추가\n\n#### 카니지\n- 후퇴 사격: '7초간 PvP 피해량 증폭 10% 증가' 효과 추가\n\n#### 블러드스테인\n- 핏빛 찌르기·스며든 힘·살육의 전조 스킬 계수 소폭 상향\n\n### 퀘스트 밸런스 조정\n| 대상 | 변경 내용 |\n|------|-----------|\n| [93. 교단의 살해] 보스 '밀라' | HP -20%, 공격력 -7.5% |\n| [208. 계속되는 훈련] 이단 심문관 4종 | HP -30%, 공격력 -25% |\n| 이단 심문관 – 심판사제 | 회복 스킬 쿨타임 증가 |\n| 이단 심문관 – 수호자 | 방패벽 스킬 쿨타임 증가 |\n\n### 신규 콘텐츠\n\n#### 클랜 임무 (신규 추가)\n- 클랜원 협동 PvE 보스 콘텐츠\n- 클랜 3레벨 이상부터 이용 가능\n- 주 1회, 최대 50인 참여 (수습 등급 제외)\n- 타임어택 형식, 달성 단계에 따라 개인 보상 + 클랜 보상 차등 지급\n\n### 기능 개선\n- 영웅 등급 방어구 '공허의 심판자 세트' 4종 거래소 노출 오류 수정\n- 반복 획득 가능한 스킬북 **분해 기능 추가**\n- 보스 출현 UI 출력 시 UI 뒤로 클릭 가능하도록 수정\n\n### 기타\n- 신규 서버 **'리델'** 오픈 (스트리머 전용 월드, 재화 지원 강화)\n\n### 개발자 노트\n> 한기현 PD: \"클래스 밸런싱은 다양한 게임 내 지표를 살펴보고 전체 클래스 간의 격차를 줄이는 데 중점을 뒀다.\"\n\n---\n\n## UPDATE-03 | 2025-09-27~28 | 쟁탈전 프리시즌\n\n### 기본 정보\n- **유형**: 신규 콘텐츠 (PvP 전장)\n- **일정**: 전초전 9/27(토), 선발전·결승전 9/28(일)\n\n### 쟁탈전 시스템 (신규)\n\n#### 구조\n```\n전초전 (각 서버 클랜 전투력 상위 3개)\n  → 선발전 (서버 간 매칭)\n    → 결승전 (서버 대표 클랜 간 최강 클랜 결정)\n```\n\n#### 점수 획득 방식\n- **전초전·선발전**: 네임드 몬스터 마지막 타격 처치, 상대 클랜 플레이어 처치\n- **결승전**: 피의 제단·피의 대제단 점령(시간당 점수), 잊혀진 군주·흉물 처치\n\n#### 상금 (프리시즌 기준)\n- 총 상금: 550만 다이아\n  - 전초전 1위: 50만 다이아\n  - 결승전 총상금: 500만 다이아 (1위 60%, 기여도분 40%)\n\n#### 승자의 특권\n- 전초전 1위: 서버 내 공지권, 월드 보스 출현 시간 변경권\n- 결승전 1위: 채팅 금지령, 게헨나 보스 출현 시간 변경권, 게헨나 2구역 입장 위치 변경권\n\n#### 제한\n- 클랜 가입 후 24시간 미경과 캐릭터 입장 불가\n\n---\n\n## UPDATE-04 | 2025-10-01 | 3차 업데이트\n\n### 기본 정보\n- **유형**: 밸런스·보상 재조정\n\n### 주요 변경\n- 게임 내 보상 밸런스 재조정 (경제 건강성 강화 목적)\n- 쟁탈전 시스템 안정화 패치\n- 편의 기능 개선 및 버그 수정\n\n### 개발자 노트\n> 한기현 PD: \"게임 경제를 건강하게 유지하고 장기적인 성장의 기반을 다지기 위한 필수적인 조치.\"\n\n---\n\n## UPDATE-05 | 2025-10-05 | 혈계 진화 추가\n\n### 기본 정보\n- **유형**: 신규 성장 시스템 추가\n\n### 신규 시스템\n\n#### 혈계 진화 (신규)\n- 진화석을 소모해 세포를 진화시키고 추가 능력치 획득\n- 행(Row) 선택 후 진화 → 확률적으로 내용 |\n|----------|-----------|\n| 출석 보상 | 아카샤 추가 기념 |\n| 8주 영웅의 서약 | 과제 달성 점수별 보상: 15점(영웅 무기), 25점(영웅 형상 지정 소환권), 40점(영웅 탈것 지정 소환권) |\n| 3/4 글로벌 오픈 라이브 방송 | 세부 정보 사전 공개 |\n\n### 개발자 노트\n> \"4월부터는 콘텐츠 확장을 우선시 삼아 순차적으로 업데이트를 이어갈 것.\"\n\n---\n\n## UPDATE-15 | 2026-03-18 | 11차 업데이트\n\n### 기본 정보\n- **유형**: 밸런스 패치\n\n### 클래스 밸런스\n\n#### 아카샤 상향 조정\n- 전반적인 스킬 피해량 계수 상향\n- 배경: 출시 직후 피해량 부족 관련 유저 피드백 집중 반영\n  - 출시 직후 유저 반응: \"공속이 빠르나 대미지가 2,000~3,000 수준으로 너무 낮다\", \"PvP·PvE 모두 피해량 부족\"\n\n### 편의 기능\n- 기타 편의성 개선 반영\n\n### 개발자 노트 (개선현황판)\n> \"아카샤 클래스의 전반적인 스킬 밸런스를 조정했습니다. 부디 강해진 아카샤를 한번 더 플레이해주시면 감사하겠습니다.\"\n\n---\n\n## UPDATE-16 | 2026-04-08 | 12차 업데이트\n\n### 기본 정보\n- **유형**: 대규모 업데이트 — 신규 성장 콘텐츠 2종\n\n### 신규 성장 콘텐츠\n\n#### 영묘 (신규)\n- **형식**: 파견 기반 성장 콘텐츠\n- **진행 방식**:\n  1. '묘지기 파견 증서' 지불 후 묘지기와 계약·파견\n  2. 파견 완료 시 '관' 획득\n  3. 관 열쇠로 관 개방 → '관 카드' 및 아이템 획득\n  4. 승급 시도: 총 4회 기회, 확률에 따라 관 등급 1단계 상승\n- **안치 시스템**:\n  - 관 카드를 영묘에 안치 → 안치 효과 획득\n  - 관 카드 소속 영묘와 동일 영묘에 안치 시 전용 효과 + 스킬 추가 획득\n- **보유 효과**: 관 카드 등급·수량 조건에 따라 추가 능력치\n- **컬렉션**: 중복 관 카드 소모 → 카드 레벨 성장 → 조건 만족 시 추가 능력치\n\n#### 나리찬예 계곡 (신규 1인 챌린지 던전)\n- **형식**: 1인 PvE 인스턴스\n- **구성**: 총 50단계 (일반 모드 먼저 공개, 시즌 모드 추후 추가 예정)\n- **이용 조건**: 캐릭터 Lv.46 이상\n- **진행 방식**: 제한 시간 내 몬스터 웨이브 + 보스 처치 → 단계 클리어\n- **특이 규칙**:\n  - 최초 1회 클리어 시 경험치·골드 등 단계별 보상 획득\n  - 이미 완료한 단계 재도전 불가\n  - 사망 시 경험치 손실 없음\n  - 입장 시 HP/MP 완전 회복 → 던전 퇴장 시 입장 전 수치로 복구\n  - 시즌 랭킹 액티브 스킬 사용 불가\n\n### 클래스 시스템\n\n#### 클래스 변경 이벤트 (정기)\n- 기간: ~4/15 04:59\n- 변경 레벨 제한 하향: 64레벨 → **60레벨**\n\n### 클랜 시스템\n\n#### 클랜 편의성 개선\n- **클랜 이름 변경 기능** 추가 (최초 지원)\n- 클랜 금고 아이템 검색 필터 기능 추가\n- 클랜 공격대 정보 추출 기능 추가\n\n### 서버 이전 (2차)\n- 한국 리전 대상 2차 서버 이전: 4/8 18:00 ~ 4/9 23:59\n- 1차+2차 통합 총 이전 횟수: 2회 제한\n\n### 이벤트\n- 라즈비의 영묘 지원 미션 이벤트 (~4/22): 묘지기 파견 시간 단축권 등 지원\n\n---\n\n## UPDATE-17 | 2026-04-22 | 13차 업데이트\n\n### 기본 정보\n- **유형**: 성장 시스템 신규 추가 + 이벤트\n\n### 신규 성장 시스템\n\n#### 절대 규율 (신규)\n- **이용 조건**: 캐릭터 Lv.60 이상\n- **기존 규율과 차이**: 각인서 소모 방식 (트리니티 방식과 별도)\n- **각인서 획득처**: [상점] → [교환] → [다이아] 또는 마을 영원의 주화 상인\n- **슬롯 시스템**: 각 슬롯별 등급 존재 (일반·고급·희귀·영웅), 확률에 따라 등급 상승\n  - 한번 상승한 등급은 하락하지 않음\n  - 재각인 시 현재 등급 기준 능력치 그룹에서 지급\n\n#### 추가 효과 시스템 (절대 규율)\n- 모든 슬롯이 최소 [일반] MAX 달성 시 추가 효과 활성화\n- 등급 보정 규칙:\n  - 슬롯 간 등급이 다른 경우: 가장 낮은 등급 기준 적용\n  - 모든 슬롯 동일 등급 + MAX 전체 달성: 해당 등급 추가 효과 적용\n  - 모든 슬롯 동일 등급 + MAX 미달성 슬롯 존재: 한 단계 낮은 등급 추가 효과\n\n#### 절대 규율 자동 각인\n- 현재 등급과 다음 상위 등급 선택 가능\n- 슬롯 승급 시 재설정으로 상위 등급 기준 능력치 설정\n\n### 이벤트\n| 이벤트명 | 기간 | 주요 내용 |\n|----------|------|-----------|\n| 재합성권 출석부 | 4/22~5/13 | 14일 출석 시 형상/탈것 재합성권 지급 |\n| 흰 까마귀의 일일 성장 미션 | 4/22~ | 일일 성장 지원 미션 |\n| 흰 까마귀의 전투 지원 미션 | 4/22~ | 전투 관련 지원 미션 |\n\n---\n\n## 시스템별 업데이트 이력 요약\n\n### 클래스 시스템\n| 날짜 | 내용 |\n|------|------|\n| 2025-08-26 | 바이퍼·그림리퍼·블러드스테인·카니지 4클래스 출시 |\n| 2025-09-10 | 전 클래스 1차 밸런스 조정 (바이퍼 대폭 상향) |\n| 2025-12-03 | 전 클래스 2차 리밸런싱 + 클래스 체인지 시스템 최초 오픈 |\n| 2026-03-11 | 아카샤(5번째 클래스) 추가 + 클래스 변경권/외형 변경권 포함 |\n| 2026-03-18 | 아카샤 스킬 밸런스 상향 조정 |\n| 2026-04-08 | 클래스 변경 제한 레벨 64→60 하향 |\n\n### 게헨나 시스템\n| 날짜 | 내용 |\n|------|------|\n| 2025-08-26 | 게헨나 1구역 출시 |\n| 2025-10월 | 게헨나 2구역 추가 |\n| 2025-12-17 | 게헨나 3구역 신설 (100~122레벨, 8개 구역) / 1·2구역 개편 및 밸런스 조정 |\n\n### 영지 (사냥터) 확장\n| 날짜 | 내용 |\n|------|------|\n| 2025-08-26 | 초기 영지 (포에나리·크르브나 등) |\n| 2025-12-03 | 베즈단 영지 추가 (111~122레벨) |\n| 2026-03-11 | 베즈단 영지 추가 영역 개방 |\n\n### 성장 시스템 추가 이력\n| 날짜 | 신규 시스템 |\n|------|------------|\n| 2025-08-26 | 강화, 세공, 제작, 컬렉션, 초상화, 아티팩트, 규율, 세피라, 형상/탈것 |\n| 2025-10-05 | 혈계 진화 |\n| 2025-11-05 | 마력 연구 15단계 확장, 초상화(복수자 모르베인), 아티팩트(필리포스의 인장) |\n| 2026-04-08 | 영묘, 나리찬예 계곡 |\n| 2026-04-22 | 절대 규율 |\n\n### 서버 시스템 이력\n| 날짜 | 내용 |\n|------|------|\n| 2025-08-26 | 일반 서버 출시, 서버 셔플링 시스템 |\n| 2025-09-06 | 스트리머 서버 '리델' 오픈 |\n| 2025-12-03 | 블러드 레이스 서버 '에노크' 오픈 (부트캠프형) |\n| 2026-01-21 | 서버 그룹 매칭 방식 변경 |\n| 2026-02-04 | 에노크 서버 종료·서버 이전 기능 정식 오픈 |\n| 2026-03-11 | 글로벌 서버 오픈 (대만·홍콩·마카오) |\n\n### PvP 콘텐츠 이력\n| 날짜 | 내용 |\n|------|------|\n| 2025-09-27~28 | 쟁탈전 프리시즌 최초 진행 |\n| 2025-10-17~19 | 쟁탈전 1차 정규시즌 (총 상금 1.5억 다이아) |\n| 2026-01-21 | 정예 던전 '광휘의 요람' 오픈 (인터서버 PvP+PvE) |\n\n---\n\n## 개발자 공식 발언 모음\n\n| 날짜 | 발언자 | 발언 요약 |\n|------|--------|-----------|\n| 2025-09-03 | 한기현 PD | \"유저들의 목소리에 귀 기울이며 함께 호흡하겠다\" |\n| 2025-09-10 | 한기현 PD | \"클래스 간 격차를 줄이는 데 중점을 뒀다\" |\n| 2025-10-01 | 한기현 PD | \"게임 경제를 건강하게 유지하기 위한 필수적인 조치\" |\n| 2025-11-21 | 한기현 PD | \"100일 업데이트 이후 다양한 콘텐츠 지속 추가 예정\" |\n| 2026-01-26 | 한기현 PD | \"소통이 없었던 부분 반성. 더 성실하게 유저 소통 자리를 늘려가겠다\" |\n| 2026-01-27 | 한기현 PD | \"2026년에는 콘텐츠 확장을 우선시하겠다. 클랜 단위 PvE, 새로운 PvP 콘텐츠 준비 중\" |\n| 2026-02-11 | 한기현 PD | \"모든 유저들이 기다리고 있는 복구권은 2월에 지급하기로 약속했다\" |\n| 2026-03-11 | 개발팀 | \"4월부터는 콘텐츠 확장을 우선시 삼아 순차적으로 업데이트를 이어갈 것\" |\n| 2026-03-18 | 개선현황판 | \"아카샤 스킬 밸런스 조정 완료. 강해진 아카샤를 플레이해 주시길\" |\n\n---\n\n*※ 공식 포럼(forum.netmarble.com/vampir) 직접 접근이 제한되어, 넷마블 공식 보도자료 및 국민트리(게임메카), 게임뷰, 베타뉴스, 인벤 등 게임 전문 미디어를 교차 검증하여 작성하였습니다. 일부 소규모 주간 패치의 세부 항목은 누락될 수 있습니다.*\n"},{"id":"xlsx","title":"엑셀 업데이트 이력","kind":"원본 표","source":"휴먼/뱀피르_업데이트_이력.xlsx","content":"# 엑셀 자료: 뱀피르 업데이트 이력\n\n> 원본 파일: 휴먼/뱀피르_업데이트_이력.xlsx\n\n## 업데이트 이력\n\n| 날짜 | 차수 | 분류 | 핵심 내용 | 부가 내용 (상세) | 개발자 노트 / 공식 발언 |\n| --- | --- | --- | --- | --- | --- |\n| 2025-08-26 | 정식 출시 | 출시 | 뱀피르 정식 출시 | 모바일(iOS/Android) + PC(넷마블 런처) 크로스플랫폼 동시 출시.<br>5개 클래스(바이퍼·그림리퍼·블러드스테인·카니지·블러드스테인) 제공.<br>출시 9일 만에 양대 마켓 매출 1위·동시접속자 20만 명 돌파. | 리니지2 레볼루션 주요 개발진 참여. 뱀파이어 다크 판타지 MMORPG. |\n| 2025-09-03 | 1차 업데이트 | 밸런스/이벤트 | 골드 수급 & 명중 밸런스 개선 + 이벤트 오픈 | 골드 수급량 상향 조정.<br>명중 수치 밸런스 개편 (전투 체감 개선).<br>개선 현황판 신설 (유저 피드백 공개 추적).<br>출석 이벤트 '매일 매일 성장하는 계승자!' 오픈 (~9/17, 탈것 11회 소환권 II 지급).<br>황금 미션 이벤트(총 400만 골드 지급) + 몬스터 처치 이벤트 (~10/1).<br>신규 서버 '리델' 오픈 예고 (스트리머 전용 월드). | 한기현 PD: \"유저들의 목소리에 귀 기울이며 함께 호흡하겠다. 뱀피르에 대한 유저들의 소중한 의견은 더 나은 게임을 만드는 가장 중요한 밑거름이다.\" |\n| 2025-09-10 | 2차 업데이트 | 콘텐츠/밸런스 | 클래스 밸런스 전면 조정 + 클랜 임무 추가 | 전 클래스 스킬 밸런스 조정 (클래스 간 격차 축소 목표).<br>클랜 임무(협동 PvE 보스 콘텐츠) 신규 추가 — 클랜원 공동 처치 후 보상 획득.<br>게헨나 운영 개선.<br>신규 서버 '리델' 정식 오픈.<br>양대 마켓 매출 1위 기념 연계 이벤트 진행. | 한기현 PD: \"다양한 게임 내 지표를 살펴보고 전체 클래스 간의 격차를 줄이는 데 중점을 뒀다.\" |\n| 2025-09-24~<br>2025-10-01 | 3차 업데이트 | 콘텐 function markText(html,q){if(!q||q.length<2)return html;const safe=q.replace(/[.*+?^$(){}|[\]\\]/g,'\\$&');return html.replace(new RegExp('('+safe+')','gi'),'<mark>$1</mark>')}
function inline(s,q){let h=esc(s);h=h.replace(new RegExp(tick+'([^'+tick+']+)'+tick,'g'),'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');return markText(h,q)}
function row(line){let t=line.trim();if(t.startsWith('|'))t=t.slice(1);if(t.endsWith('|'))t=t.slice(0,-1);return t.split('|').map(x=>x.trim())}
function renderMd(md,q){const lines=md.replace(/\r\n/g,'\n').split('\n');let out='',i=0;while(i<lines.length){let line=lines[i];if(!line.trim()){i++;continue}if(line.startsWith(fence)){let code=[];i++;while(i<lines.length&&!lines[i].startsWith(fence))code.push(lines[i++]);i++;out+='<pre><code>'+esc(code.join('\n'))+'</code></pre>';continue}let hm=line.match(/^(#{1,4})\s+(.+)$/);if(hm){out+='<h'+hm[1].length+'>'+inline(hm[2].replace(/#+$/,'').trim(),q)+'</h'+hm[1].length+'>';i++;continue}if(/^---+$/.test(line.trim())){out+='<hr>';i++;continue}if(line.trim().startsWith('>')){let b=[];while(i<lines.length&&lines[i].trim().startsWith('>'))b.push(lines[i++].replace(/^\s*>\s?/,''));out+='<blockquote>'+b.map(x=>inline(x,q)).join('<br>')+'</blockquote>';continue}if(line.includes('|')&&i+1<lines.length&&/^\s*\|?\s*:?-{3,}:?/.test(lines[i+1])){let rows=[row(line)];i+=2;while(i<lines.length&&lines[i].includes('|')&&lines[i].trim())rows.push(row(lines[i++]));out+='<table><thead><tr>'+rows[0].map(c=>'<th>'+inline(c,q)+'</th>').join('')+'</tr></thead><tbody>'+rows.slice(1).map(r=>'<tr>'+r.map(c=>'<td>'+inline(c,q)+'</td>').join('')+'</tr>').join('')+'</tbody></table>';continue}if(/^\s*(-|\*)\s+/.test(line)){let items=[];while(i<lines.length&&/^\s*(-|\*)\s+/.test(lines[i]))items.push(lines[i++].replace(/^\s*(-|\*)\s+/,''));out+='<ul>'+items.map(x=>'<li>'+inline(x,q)+'</li>').join('')+'</ul>';continue}if(/^\s*\d+\.\s+/.test(line)){let items=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i]))items.push(lines[i++].replace(/^\s*\d+\.\s+/,''));out+='<ol>'+items.map(x=>'<li>'+inline(x,q)+'</li>').join('')+'</ol>';continue}let p=[];while(i<lines.length&&lines[i].trim()&&!/^(#{1,4})\s+/.test(lines[i])&&!lines[i].startsWith(fence)&&!/^\s*(-|\*)\s+/.test(lines[i])&&!/^\s*\d+\.\s+/.test(lines[i])&&!lines[i].trim().startsWith('>'))p.push(lines[i++]);out+='<p>'+p.map(x=>inline(x,q)).join('<br>')+'</p>'}return out}
function label(d){return d.id==='quickstart'?'빠른 시작':d.id==='newbie'?'처음 시작':d.id==='timeline'?'성장 순서':d.id==='combat'?'전투력':d.id==='official'?'공식 시스템':d.id==='updates'?'변경 이력':d.id==='xlsx'?'엑셀 표':d.title}
function renderTabs(){tabs.innerHTML=docs.map(d=>'<button class="tabbtn '+(d.id===active?'active':'')+'" data-tab="'+d.id+'"><b>'+esc(label(d))+'</b><span>'+esc(d.kind)+'</span></button>').join('');tabs.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>setActive(b.dataset.tab,true)))}
function renderDoc(q=''){const d=docs.find(x=>x.id===active)||docs[0];docsEl.innerHTML='<article class="doc" id="doc-'+d.id+'"><div class="doc-head"><div><h2>'+esc(d.title)+'</h2><div class="source">'+esc(d.source)+'</div></div><span class="tag">'+esc(d.kind)+'</span></div><div class="content">'+renderMd(d.content,q)+'</div></article>'}
function setActive(id,scroll){active=id;renderTabs();renderDoc(input.value.trim());if(scroll)document.getElementById('docs').scrollIntoView({behavior:'smooth',block:'start'})}
function search(q){q=q.trim();if(q.length<2){resultsEl.classList.remove('active');resultsEl.innerHTML='';renderDoc('');return}const low=q.toLowerCase(),hits=[];docs.forEach(d=>d.content.split(/\r?\n/).forEach((line,idx)=>{if(line.toLowerCase().includes(low))hits.push({doc:d,line:line.trim().replace(/^#+\s*/,''),idx})}));renderDoc(q);resultsEl.classList.add('active');if(!hits.length){resultsEl.innerHTML='<strong>검색 결과 0개</strong><p class="source">다른 표현으로 검색해 보세요.</p>';return}resultsEl.innerHTML='<strong>검색 결과 '+hits.length+'개</strong>'+hits.slice(0,80).map(h=>'<div class="result-item"><button data-target="'+h.doc.id+'"><b>'+esc(h.doc.title)+'</b> <span class="source">'+(h.idx+1)+'행</span><div class="snippet">'+markText(esc(h.line.slice(0,180)),q)+'</div></button></div>').join('')+(hits.length>80?'<p class="source">상위 80개만 표시합니다.</p>':'');resultsEl.querySelectorAll('button[data-target]').forEach(b=>b.addEventListener('click',()=>setActive(b.dataset.target,true)))}
let timer;input.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(()=>search(input.value),120)});clearBtn.addEventListener('click',()=>{input.value='';resultsEl.classList.remove('active');resultsEl.innerHTML='';renderDoc('');input.focus()});renderTabs();renderDoc();
</script></body></html>
